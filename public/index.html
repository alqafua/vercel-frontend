<html lang="ar" dir="rtl">
<head>

<title>Cheetah ⚡</title>
<style>

body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

function handleServerMsg(msg){
  let needRender=false;
  switch(msg.type){
    case 'init':
      Object.assign(C,msg.data);
      if(msg.data.settings)C.settings={...C.settings,...msg.data.settings};
      if(msg.data.settings?.dirFilter&&msg.data.settings.dirFilter!=='all')C.filter=msg.data.settings.dirFilter;
      if(!C.btBusy&&(C.btDownloading||C.btUpdating||C.btRunning||C.btOptimizing||C.btOptimizingSym||C.btOptimizingRespect||C.btOptimizingTuned||C.btOptimizingMgmt)){
        C.btDownloading=false;C.btUpdating=false;C.btRunning=false;C.btOptimizing=false;C.btOptimizingSym=false;C.btOptimizingRespect=false;C.btOptimizingTuned=false;C.btOptimizingMgmt=false;C.btProgress=null;
      }
      needRender=true;
      setTimeout(rSysStatusBox,100);
      break;
    case 'state':
      Object.assign(C,msg.data);
      if(msg.data.settings)C.settings={...C.settings,...msg.data.settings};
      // لا render - فقط تحديث البيانات
      break;
    case 'alert':
      C.alerts=[msg.data,...C.alerts].slice(0,200);
      C.toast=msg.data;clearTimeout(toastRef);
      toastRef=setTimeout(()=>{C.toast=null;updateToast();},6000);
      if(C.settings.soundEnabled)playSound(msg.data.color==='confirmed'?'conf':msg.data.color==='purple'?'trail':'n');
      updateAlertBadge();showToast(msg.data);return;
    case 'priceUpdates':
      Object.entries(msg.data).forEach(([sym,d])=>{if(C.symbolData[sym]){C.symbolData[sym].rsi=d.rsi;C.symbolData[sym].zone=d.zone;if(d.error===false)C.symbolData[sym].error=false;}});
      updateCards();return;
    case 'scanning':C.scanning=msg.data;break;
    case 'symbolData':
      Object.assign(C.symbolData, msg.data);
      updateGridOnly();
      return;
    case 'progress':C.progress=msg.data;break;
    case 'settings':C.settings={...C.settings,...msg.data};break;
    case 'symbolSettings':C.symbolSettings=msg.data||{};if(symSetSym)selectSymForSettings(symSetSym);needRender=true;break;
    case 'alerts':C.alerts=msg.data;needRender=true;break;
    case 'trades':C.openTrades=msg.data;needRender=true;break;
    case 'closedTrades':C.closedTrades=msg.data;break;
    case 'accounts':C.accounts=msg.data;break;
    case 'copyOn':C.copyOn=msg.data;needRender=true;break;
    case 'copyLog':C.copyLog=[msg.data,...C.copyLog].slice(0,300);break;
    case 'addAccountResult':
      if(msg.data.success){showForm=false;formAccId=null;fd={name:'',apiKey:'',apiSecret:'',sizeRatio:'5',tag:'personal',isMaster:false};showNotif('✅ تم إضافة الحساب — $'+(msg.data.balance?.toFixed(2)||'—'));needRender=true;}
      else alert('❌ فشل: '+msg.data.error);break;
    case 'testAccountResult':
      if(msg.data.success)alert('✅ الاتصال ناجح — $'+(msg.data.balance?.toFixed(2)||'—'));
      else alert('❌ فشل: '+msg.data.error);break;
    case 'executeResult':{const ok2=(msg.data||[]).filter(r=>r.ok).length;showNotif(ok2>0?'✅ تم التنفيذ في '+ok2+' حساب':'❌ فشل التنفيذ');break;}
    case 'dcaOrders':C.dcaOrders=msg.data;needRender=true;break;
    case 'pendingOrders':C.pendingOrders=msg.data;needRender=true;break;
    case 'sysStatus':C.sysStatus=msg.data;rSysStatusBox();needRender=true;break;
    case 'sentSigs':C.sentSigs=msg.data||{};break;
    case 'manualOrderResult':
      if(msg.data.success)showNotif(`✅ ${msg.data.sym} ${msg.data.side} × ${msg.data.qty} (${msg.data.lev}x) — ${msg.data.acc}`);
      else showNotif('❌ فشل: '+msg.data.error);
      break;
    case 'dcaError':showNotif('❌ '+msg.data);break;
    case 'waitQueue':C.waitQueue=msg.data||[];needRender=true;break;
    case 'respectData':C.respectData=msg.data||{};C.respectProgress=null;needRender=true;break;
    case 'respectProgress':C.respectProgress=msg.data;needRender=true;break;
    case 'perSymST':C.perSymST=msg.data||{};C.perSymSTProgress=null;needRender=true;break;
    case 'perSymSTProgress':C.perSymSTProgress=msg.data;needRender=true;break;
    case 'reportSent':showNotif('✅ تم إرسال التقرير على تلغرام');break;
    case 'exportData':saveBackupData(msg.data);break;
    case 'importDone':showNotif('✅ تمت الاستعادة — ستُحدَّث البيانات');break;
    case 'ema200':C.ema200=msg.data;updateEMA200Lamp();return;
    case 'superTrend':C.superTrend=msg.data;updateSuperTrendLamp();return;
    case 'btInfo':C.btInfo=msg.data;needRender=true;break;
    case 'btProgress':
      C.btProgress=msg.data;
      if(msg.data.phase==='busy'){C.btDownloading=false;C.btUpdating=false;C.btOptimizing=false;showNotif('⏳ هناك عملية شغّالة بالفعل');needRender=true;break;}
      if(msg.data.phase==='stopping')return;
      // إذا لم نكن في صفحة Backtest أو العملات: حدّث الحالة فقط بدون إعادة رسم الصفحة الحالية
      // (كان يسبب اختفاء/فلاش الشاشة بشكل متكرر أثناء عمل الفحص/الأوبتيمايزر في الخلفية)
      if(C.page!=='backtest'&&C.page!=='symbols')return;
      if(updateBtProgress())return;
      needRender=true;break;
    case 'btDownloadDone':
      C.btDownloading=false;C.btUpdating=false;C.btProgress=null;
      showNotif(msg.data.ok?'✅ اكتملت العملية بنجاح':'❌ '+(msg.data.error||'فشلت العملية'));
      send('btInfo',{});
      needRender=true;break;
    case 'btResult':C.btRunning=false;C.btResult=msg.data;needRender=true;break;
    case 'btOptDone':C.btOptimizing=false;C.btProgress=null;C.btOptResult=msg.data;needRender=true;break;
    case 'btOptSymDone':C.btOptimizingSym=false;C.btProgress=null;C.btOptSymResult=msg.data;needRender=true;break;
    case 'btOptRespectDone':C.btOptimizingRespect=false;C.btProgress=null;C.btRespectResult=msg.data;saveBtSymState();needRender=true;break;
    case 'btOptTunedDone':C.btOptimizingTuned=false;C.btProgress=null;C.btTunedResult=msg.data;saveBtSymState();needRender=true;break;
    case 'btOptManagementDone':C.btOptimizingMgmt=false;C.btProgress=null;C.btMgmtResult=msg.data;saveBtSymState();needRender=true;break;
    case 'btSymChartDataDone':
      C.btChartLoading=false;C.btChartData=msg.data;
      if(msg.data.error)showNotif('❌ '+msg.data.error);
      needRender=true;break;
    case 'resultsReportDone':
      C.resSending=false;
      showNotif(msg.data?.ok?'✅ أُرسل ملخص النتائج إلى تلغرام':'❌ '+(msg.data?.error||'فشل الإرسال'));
      needRender=true;break;
    case 'btSendFileDone':
      C.sumSending=false;
      showNotif(msg.data?.ok?'✅ أُرسل الملف إلى تلغرام':'❌ '+(msg.data?.error||'فشل الإرسال'));
      needRender=true;break;
  }
  if(needRender)schedRender();
}

function rTrades(body){

    btns.appendChild(el('button',{className:'btn',style:{fontSize:'10px',background:'rgba(255,165,2,.1)',borderColor:'var(--orange)',color:'var(--orange)'},onClick:()=>{if(confirm('إغلاق 25% من '+sym+'؟'))send('closeBySymbol',{sym,side,pct:25});}},'🔸 25%'));

function fmtTime(ms){if(!ms||ms<0)return '—';const s=Math.round(ms/1000);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return (h?h+':':'')+String(m).padStart(h?2:1,'0')+':'+String(ss).padStart(2,'0');}
function fmtPct(v){const n=parseFloat(v);if(!isFinite(n))return v+'%';const a=Math.abs(n);const sign=n<0?'-':'';if(a>=1e9)return sign+(a/1e9).toFixed(2)+'B%';if(a>=1e6)return sign+(a/1e6).toFixed(2)+'M%';if(a>=1e3)return sign+(a/1e3).toFixed(2)+'K%';return n+'%';}
function fmtNum(v){const n=parseFloat(v);if(!isFinite(n))return String(v);const a=Math.abs(n);const sign=n<0?'-':'';if(a>=1e9)return sign+(a/1e9).toFixed(2)+'B';if(a>=1e6)return sign+(a/1e6).toFixed(2)+'M';if(a>=1e3)return sign+(a/1e3).toFixed(2)+'K';return String(n);}
function drawBtEquity(canvas,eq){const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,n=eq.length;ctx.clearRect(0,0,W,H);if(n<2)return;const mn=Math.min(...eq),mx=Math.max(...eq),rng=(mx-mn)||1;ctx.beginPath();ctx.lineWidth=2;ctx.strokeStyle=eq[n-1]>=eq[0]?'#2ed573':'#ff4757';eq.forEach((v,i)=>{const x=i/(n-1)*W,y=H-((v-mn)/rng)*(H-10)-5;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();}

// ════════════════ النافذة 3 "الخلاصة" — دمج نتائج النافذتين 1+2 وإعطاء توصية لكل عملة ════════════════
// هل إحصاءات احترام الشورت/اللونغ ومتوسط الانعكاس تجاوزت العتبات؟ (يُعتبر "ناجحاً" إن لم تتوفر عينة كافية — مطابق لمنطق صفحة النتائج)
function passSigForRow(sh,lo,f){
  const shOk=!sh||!sh.total||sh.total<MIN_SIG_SAMPLE||sh.respectRate>=f.minRespectShort;
  const loOk=!lo||!lo.total||lo.total<MIN_SIG_SAMPLE||lo.respectRate>=f.minRespectLong;
  const revs=[sh,lo].filter(x=>x&&x.total>=MIN_SIG_SAMPLE).map(x=>x.avgReversalPct);
  const avgRev=revs.length?revs.reduce((a,b)=>a+b,0)/revs.length:null;
  const revOk=avgRev==null||avgRev>=f.minAvgReversal;
  return shOk&&loOk&&revOk;
}
function classifySummaryRow(m,sh,lo,f){
  if(!m)return'exclude';
  if(m.netReturnPct<=0||m.trades<5||m.maxDrawdownPct>30)return'exclude';
  if(m.trades>=f.minTrades&&m.maxDrawdownPct<=f.maxDD&&m.profitFactor>=f.minPF&&passSigForRow(sh,lo,f))return'include';
  return'watch';
}
// يدمج نتائج "احترام المؤشر" و"الدخول والخروج" لكل عملة ويحسب توصية (احضر/راجع/استبعد) قابلة للتعديل اليدوي
function buildSummaryRows(){
  const mgBy=C.btMgmtResult?.bySymbol||{};
  const f=RES_PRESETS[C.sumPreset]||RES_PRESETS.loose;
  const rows=Object.entries(mgBy).map(([sym,info])=>{
    const sh=info.short||null,lo=info.long||null;
    const m=info.metrics||null;
    const rec=classifySummaryRow(m,sh,lo,f);
    const accepted=C.sumOverrides[sym]!==undefined?C.sumOverrides[sym]:rec==='include';
    return{sym,recipe:info.recipe,sh,lo,combo:info.combo,settings:info.settings,metrics:m,score:info.score,rec,accepted};
  });
  rows.sort((a,b)=>(b.score??-Infinity)-(a.score??-Infinity));
  return rows;
}
// إحصاءات المحفظة على العملات "المعتمدة" فقط — مع إجمالي % رأس المال المستخدم لو فُتحت كل الصفقات معاً
function summaryPortfolioStats(rows){
  const acc=rows.filter(r=>r.accepted&&r.metrics);
  const n=acc.length;
  const avg=fn=>n?acc.reduce((s,r)=>s+fn(r),0)/n:0;
  const totalAmt=acc.reduce((s,r)=>s+(parseFloat(String(r.combo?.cxAmt||'0').replace('%',''))||0),0);
  return{
    n,
    avgRet:avg(r=>r.metrics.netReturnPct),
    avgDD:avg(r=>r.metrics.maxDrawdownPct),
    avgWin:avg(r=>r.metrics.winRate),
    totalTrades:acc.reduce((s,r)=>s+r.metrics.trades,0),
    totalAmt,
  };
}

// ════════════════ صفحة "النتائج" — تحليل شامل لملفات الفحص/التحسين ════════════════
function classifyResultFile(name,data){
  if(!data||typeof data!=='object')return{type:'unknown',label:'❓ ملف غير معروف',name};
  if(data.bySymbol&&typeof data.bySymbol==='object'&&Object.keys(data.bySymbol).length)
    return{type:'perSymbol',label:'🪙 أفضل إعداد لكل عملة',name,count:Object.keys(data.bySymbol).length,exportedAt:data.exportedAt};
  if(Array.isArray(data.leaderboard)&&data.leaderboard.length)
    return{type:'leaderboard',label:'🏆 أفضل 10 (فحص عام)',name,count:data.leaderboard.length,exportedAt:data.exportedAt};
  if(data.signalStats&&data.metrics&&data.tf)
    return{type:'run',label:'🧪 نتيجة تشغيل إعداد',name,count:Object.keys(data.signalStats||{}).length,exportedAt:data.exportedAt,tf:data.tf};
  if(data.symbol&&data.settings)
    return{type:'symbolSetting',label:'⚙️ إعداد عملة: '+data.symbol,name,exportedAt:data.exportedAt};
  if(data.settings)
    return{type:'setting',label:'⚙️ إعداد واحد',name,exportedAt:data.exportedAt};
  return{type:'unknown',label:'❓ ملف غير معروف',name};
}
async function handleResultsFiles(fileList){
  let added=0,rejected=0;
  for(const file of Array.from(fileList)){
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      const meta=classifyResultFile(file.name,data);
      if(meta.type==='unknown'){rejected++;continue;}
      let payload=data;
      if(meta.type==='run'){
        // لا نحتفظ بمصفوفة الصفقات الكاملة (قد تكون ضخمة) — نحتاج فقط الملخص وجودة الإشارات
        payload={tf:data.tf,settings:data.settings,metrics:data.metrics,signalStats:data.signalStats,tradesCount:Array.isArray(data.trades)?data.trades.length:data.trades,exportedAt:data.exportedAt};
      }
      C.resFiles.push({...meta,data:payload});
      added++;
    }catch(e){rejected++;}
  }
  C.resAnalysis=null;
  showNotif(added?`✅ تمت إضافة ${added} ملف`+(rejected?` (تم تجاهل ${rejected} غير صالح)`:''):'❌ لم يُضَف أي ملف صالح');
  render();
}
// جودة إشارات Trailing لعملة معيّنة (شورت ts / لونج tl) من sigStats المُخزّنة مع كل عملة
function sigQualityFor(r){
  const ss=r.sigStats;
  if(!ss)return null;
  const ts=ss.ts||{},tl=ss.tl||{};
  const revs=[ts.avgReversalPct,tl.avgReversalPct].filter(v=>v!=null);
  return{
    tsRespect:ts.respectRate??null,tsTotal:ts.total??0,
    tlRespect:tl.respectRate??null,tlTotal:tl.total??0,
    avgReversal:revs.length?revs.reduce((a,b)=>a+b,0)/revs.length:null,
    ob:ss.ob?{respect:ss.ob.respectRate??null,total:ss.ob.total??0,avgRev:ss.ob.avgReversalPct??null}:null,
    os:ss.os?{respect:ss.os.respectRate??null,total:ss.os.total??0,avgRev:ss.os.avgReversalPct??null}:null,
    conf:ss.conf?{respect:ss.conf.respectRate??null,total:ss.conf.total??0,avgRev:ss.conf.avgReversalPct??null}:null,
    hasFullBreakdown:!!(ss.ob&&ss.os&&ss.conf),
  };
}
// يُقيِّم نوع إشارة واحد: true=جيد، false=ضعيف، null=بيانات غير كافية (لا تغيير)
function evalSigType(st,thr){
  if(!st||!st.total||st.total<MIN_SIG_SAMPLE)return null;
  return st.respectRate>=thr;
}
// "الزبدة الكاملة" — يضبط sigQueueFilters تلقائياً لكل عملة بناءً على جودة كل نوع إشارة (OB/OS/CONF/TS/TL)
// مقاسة فعلياً على بيانات هذه العملة، مع إبقاء أي نوع بلا بيانات كافية على وضعه الحالي.
function refineSigQueueFilters(r,f){
  const cur={ob:true,os:true,conf:true,trail:true,...((r.settings&&r.settings.sigQueueFilters)||{})};
  const ss=r.sigStats;
  if(!ss)return{sigQueueFilters:cur,detail:null,changed:false,hasFullBreakdown:false};
  const thrS=f.minRespectShort,thrL=f.minRespectLong,thrC=(f.minRespectShort+f.minRespectLong)/2;
  const obOk=evalSigType(ss.ob,thrS),osOk=evalSigType(ss.os,thrL),confOk=evalSigType(ss.conf,thrC);
  const tsOk=evalSigType(ss.ts,thrS),tlOk=evalSigType(ss.tl,thrL);
  let ob=obOk===null?cur.ob:obOk;
  let os=osOk===null?cur.os:osOk;
  let conf=confOk===null?cur.conf:confOk;
  let trail=(tsOk===null&&tlOk===null)?cur.trail:(tsOk===true||tlOk===true);
  if(!ob&&!os&&!conf&&!trail){
    // لا تترك العملة بلا أي إشارة — فعّل أفضل نوع قياساً بنسبة الاحترام
    const cands=[['ob',ss.ob,'ob'],['os',ss.os,'os'],['conf',ss.conf,'conf'],['ts',ss.ts,'trail'],['tl',ss.tl,'trail']]
      .filter(([,st])=>st&&st.total>0).sort((a,b)=>(b[1].respectRate??0)-(a[1].respectRate??0));
    if(cands.length){const key=cands[0][2];ob=key==='ob';os=key==='os';conf=key==='conf';trail=key==='trail';}
    else{ob=true;os=true;conf=true;trail=true;}
  }
  const sigQueueFilters={ob,os,conf,trail};
  const changed=JSON.stringify(sigQueueFilters)!==JSON.stringify({ob:!!cur.ob,os:!!cur.os,conf:!!cur.conf,trail:!!cur.trail});
  return{sigQueueFilters,detail:{ob:obOk,os:osOk,conf:confOk,ts:tsOk,tl:tlOk},changed,hasFullBreakdown:!!(ss.ob&&ss.os&&ss.conf)};
}
function sigFiltersLabel(sf){
  if(!sf)return'—';
  const parts=[];
  if(sf.ob)parts.push('OB');
  if(sf.os)parts.push('OS');
  if(sf.conf)parts.push('⚡CONF');
  if(sf.trail)parts.push('🟣Trail');
  return parts.length?parts.join('+'):'❌ بلا إشارات';
}
function analyzeResultFiles(files,filters){
  const f=filters||RES_PRESETS.loose;
  // 1) دمج كل ملفات "أفضل إعداد لكل عملة" — لكل عملة نحتفظ بأعلى نقاط (score)
  const merged={};
  files.filter(f=>f.type==='perSymbol').forEach(f=>{
    Object.entries(f.data.bySymbol).forEach(([sym,info])=>{
      if(!info||!info.metrics)return;
      const sc=info.score??-Infinity;
      if(!merged[sym])merged[sym]={sym,...info,sources:[f.name]};
      else if(sc>(merged[sym].score??-Infinity))merged[sym]={sym,...info,sources:[...merged[sym].sources,f.name]};
      else merged[sym].sources.push(f.name);
    });
  });
  const rows=Object.values(merged).sort((a,b)=>(b.score??-Infinity)-(a.score??-Infinity));

  // 2) تصنيف كل عملة: جاهزة ✅ / تحتاج مراجعة ⚠️ / استبعاد ❌ (بحسب الفلاتر المختارة)
  const include=[],exclude=[],watch=[];
  rows.forEach(r=>{
    const m=r.metrics;
    const sq=sigQualityFor(r);
    r.sigQuality=sq;
    const passSig=!sq||(
      (sq.tsRespect==null||sq.tsRespect>=f.minRespectShort)&&
      (sq.tlRespect==null||sq.tlRespect>=f.minRespectLong)&&
      (sq.avgReversal==null||sq.avgReversal>=f.minAvgReversal)
    );
    // الإعداد النهائي "المُحسَّن" — نفس إدارة الصفقة الفائزة + فلاتر إشارات مُعاد ضبطها لكل عملة
    const refined=refineSigQueueFilters(r,f);
    r.refined=refined;
    r.finalSettings=r.settings?{...r.settings,sigQueueFilters:refined.sigQueueFilters}:r.settings;
    if(m.netReturnPct<=0||m.trades<5||m.maxDrawdownPct>30)exclude.push(r);
    else if(m.trades>=f.minTrades&&m.maxDrawdownPct<=f.maxDD&&m.profitFactor>=f.minPF&&passSig)include.push(r);
    else watch.push(r);
  });

  // 3) إحصاءات عامة
  const total=rows.length;
  const sum=f=>rows.reduce((s,r)=>s+f(r),0);
  const avgRet=total?sum(r=>r.metrics.netReturnPct)/total:0;
  const avgDD=total?sum(r=>r.metrics.maxDrawdownPct)/total:0;
  const avgTrades=total?sum(r=>r.metrics.trades)/total:0;
  const avgWin=total?sum(r=>r.metrics.winRate)/total:0;
  const profitable=rows.filter(r=>r.metrics.netReturnPct>0).length;

  // 4) جودة إشارات RSI من ملفات "نتيجة تشغيل"
  const sigRows=[];
  files.filter(f=>f.type==='run').forEach(f=>{
    Object.entries(f.data.signalStats||{}).forEach(([sym,st])=>{
      sigRows.push({sym,...st,source:f.name,tf:f.data.tf});
    });
  });
  sigRows.sort((a,b)=>(b.respectRate??0)-(a.respectRate??0));

  // 5) إعدادات عامة مرشّحة (من ملفات الفحص التلقائي العام)
  const generalSettings=[];
  files.filter(f=>f.type==='leaderboard').forEach(f=>{
    (f.data.leaderboard||[]).forEach(it=>generalSettings.push({...it,source:f.name}));
  });
  generalSettings.sort((a,b)=>(b.score??-Infinity)-(a.score??-Infinity));

  // 6) إعدادات منفردة مرفوعة (للعرض فقط)
  const singleSettings=files.filter(f=>f.type==='setting'||f.type==='symbolSetting').map(f=>({name:f.name,...f.data}));

  return{
    fileMetas:files.map(f=>({name:f.name,type:f.type,label:f.label,count:f.count,exportedAt:f.exportedAt,tf:f.tf})),
    rows,total,profitable,avgRet,avgDD,avgTrades,avgWin,
    sigRows,generalSettings,singleSettings,
    recommendations:{include,exclude,watch},
    refinedCount:rows.filter(r=>r.refined&&r.refined.changed).length,
    fullBreakdownCount:rows.filter(r=>r.sigQuality&&r.sigQuality.hasFullBreakdown).length,
    filters:f,
    generatedAt:new Date().toISOString(),
  };
}

  const recG=el('div',{className:'sgrid2',style:{gridTemplateColumns:'repeat(3,1fr)'}});
  recG.appendChild(mkS('✅ جاهزة للاستخدام',a.recommendations.include.length,'c-green'));
  recG.appendChild(mkS('⚠️ تحتاج مراجعة',a.recommendations.watch.length,'c-orange'));
  recG.appendChild(mkS('❌ يُفضَّل استبعادها',a.recommendations.exclude.length,'c-red'));
  rec.appendChild(recG);
  const f=a.filters||RES_PRESETS.loose;
  rec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'8px',lineHeight:'1.9',whiteSpace:'pre-line'}},
    `✅ جاهزة: عائد موجب، تراجع ≤${f.maxDD}%، صفقات ≥${f.minTrades}، Profit Factor ≥${f.minPF}`+(f.minRespectShort||f.minRespectLong||f.minAvgReversal?`، احترام شورت≥${f.minRespectShort}% ولونج≥${f.minRespectLong}%، متوسط انعكاس≥${f.minAvgReversal}%`:'')+' — أنسب للتطبيق المباشر.\n'+
    '⚠️ تحتاج مراجعة: نتيجتها مقبولة لكن لم تستوفِ كل الشروط أعلاه — راجعها بالشارت قبل التطبيق.\n'+
    '❌ يُفضَّل استبعادها: عائد سالب/صفر، أو تراجع >30%، أو صفقات قليلة جداً (<5) — بياناتها غير كافية أو نتيجتها سيئة.'));
  rep.appendChild(rec);

  // ── 🔧 الإعداد النهائي المُحسَّن (الزبدة الكاملة لكل عملة) ──
  const refSec=el('div',{className:'set-section'});
  refSec.appendChild(el('div',{className:'set-sec-title'},'🔧 الإعداد النهائي المُحسَّن — "الزبدة الكاملة" لكل عملة'));
  refSec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'8px',lineHeight:'1.9'}},
    'لكل عملة: نفس إدارة الصفقة (TP/SL/رافعة/الفريم...) من أفضل نتيجة، بالإضافة لإعادة ضبط أنواع الإشارات (OB/OS/⚡CONF/🟣Trail) تلقائياً بناءً على نسبة الاحترام الفعلية المقاسة لكل نوع على حدة لهذه العملة — فيُعطَّل أي نوع إشارة ضعيف ويُفعَّل ما أثبت جودته فقط. هذا هو الإعداد المناسب للتنزيل ورفعه للبوت قبل التداول بأموال حقيقية.'));
  if(a.fullBreakdownCount<a.total){
    refSec.appendChild(el('div',{className:'set-info',style:{marginBottom:'8px'}},
      `⚠️ ${a.fullBreakdownCount} من ${a.total} عملة فقط تحتوي بيانات جودة كاملة لكل نوع إشارة (OB/OS/CONF/TS/TL). الباقي من ملفات قديمة وتم تحسينها بالاعتماد على Trailing فقط (ts/tl) كما كان سابقاً. لتحصل على "الزبدة الكاملة" لكل العملات، أعد تشغيل "أفضل إعداد لكل عملة" من تبويب الباك تيست بعد هذا التحديث ثم ارفع الملف الجديد هنا.`));
  }
  if(a.refinedCount){
    refSec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--green)',fontWeight:'700',marginBottom:'8px'}},
      `🔧 تم تعديل فلاتر الإشارات تلقائياً لـ ${a.refinedCount} من ${a.total} عملة (مقارنة بإعداد الفحص الأصلي).`));
  }
  if(a.recommendations.include.length){
    const dlInc=el('button',{className:'btn no-print',style:{width:'100%',padding:'12px',background:'rgba(46,213,115,.12)',borderColor:'var(--green)',color:'var(--green)',fontWeight:'800'}});
    dlInc.textContent='⬇️ تنزيل الإعدادات النهائية "المُحسَّنة" — الجاهزة ('+a.recommendations.include.length+' عملة) كملف واحد';
    dlInc.onclick=()=>downloadRecommendedBundle(a.recommendations.include,'الاعدادات-النهائية-المحسنة.json');
    refSec.appendChild(dlInc);
  }
  if(a.rows.length){
    const dlAll=el('button',{className:'btn no-print',style:{width:'100%',marginTop:'8px',padding:'12px',background:'rgba(61,159,255,.12)',borderColor:'var(--blue)',color:'var(--blue)',fontWeight:'800'}});
    dlAll.textContent='⬇️ تنزيل الإعدادات النهائية لكل العملات ('+a.rows.length+' عملة) كملف واحد';
    dlAll.onclick=()=>downloadRecommendedBundle(a.rows,'كل-الاعدادات-النهائية-المحسنة.json');
    refSec.appendChild(dlAll);
  }
  rep.appendChild(refSec);

  // ── جدول ترتيب العملات ──
  if(a.rows.length){
    const tblSec=el('div',{className:'set-section'});
    tblSec.appendChild(el('div',{className:'set-sec-title'},'🏆 ترتيب العملات — من الأفضل للأسوأ ('+a.rows.length+')'));
    tblSec.appendChild(el('div',{className:'no-print',style:{fontSize:'11px',color:'var(--text2)',marginBottom:'8px'}},'🧪 جرّب وعدّل في الباك تيست · ⬇️ تنزيل الإعداد النهائي المُحسَّن لهذه العملة منفردة'));
    tblSec.appendChild(buildSymbolTable(a.rows,a.recommendations));
    rep.appendChild(tblSec);

    // ── 🔬 تفصيل جودة كل نوع إشارة ──
    const brkSec=el('div',{className:'set-section'});
    brkSec.appendChild(el('div',{className:'set-sec-title'},'🔬 تفصيل جودة كل نوع إشارة لكل عملة (OB/OS/CONF/TS/TL)'));
    brkSec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'8px',lineHeight:'1.8'}},
      `لكل نوع إشارة: نسبة الاحترام% (عدد الإشارات). ✅ = جيد ويُفعَّل في الإعداد النهائي · ❌ = ضعيف ويُعطَّل · ➖ = عدد إشارات أقل من ${MIN_SIG_SAMPLE} (غير موثوق — يُترك على وضعه الحالي) · — = لا توجد بيانات لهذا النوع.`));
    brkSec.appendChild(buildSigBreakdownTable(a.rows));
    rep.appendChild(brkSec);
  }else{
    const noData=el('div',{className:'set-section'});
    noData.appendChild(el('div',{className:'set-info'},'⚠️ لم يتم رفع أي ملف "أفضل إعداد لكل عملة" — لا يوجد ترتيب للعملات. ارفع ملف bySymbol للحصول على القائمة المرتبة.'));
    rep.appendChild(noData);
  }

  // ── جودة إشارات RSI ──
  if(a.sigRows.length){
    const sigSec=el('div',{className:'set-section'});
    sigSec.appendChild(el('div',{className:'set-sec-title'},'🎯 جودة إشارات RSI لكل عملة (من نتيجة التشغيل)'));
    sigSec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'8px',lineHeight:'1.8'}},
      '«نسبة الاحترام» = نسبة الإشارات التي تبعها انعكاس فعلي بالسعر. الصفوف الخافتة = أقل من 30 إشارة، والنسبة فيها غير موثوقة بدرجة كافية.'));
    sigSec.appendChild(buildSigTable(a.sigRows));
    rep.appendChild(sigSec);
  }

  // ── إعدادات عامة مرشّحة ──
  if(a.generalSettings.length){
    const genSec=el('div',{className:'set-section'});
    genSec.appendChild(el('div',{className:'set-sec-title'},'⚙️ إعدادات عامة مرشّحة (من ملفات الفحص التلقائي العام)'));
    genSec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'8px',lineHeight:'1.8'}},
      'هذه إعدادات "عامة" جُرِّبت على كل العملات معاً بنفس القيم — مفيدة كنقطة بداية أو لتطبيقها على عملات لم تُفحص فردياً.'));
    genSec.appendChild(buildGeneralTable(a.generalSettings));
    rep.appendChild(genSec);
  }

  // ── إعدادات منفردة مرفوعة ──
  if(a.singleSettings.length){
    const ssSec=el('div',{className:'set-section'});
    ssSec.appendChild(el('div',{className:'set-sec-title'},'📄 إعدادات منفردة مرفوعة'));
    a.singleSettings.forEach(s=>{
      const box=el('div',{style:{background:'var(--bg3)',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px',fontSize:'11px',lineHeight:'1.8'}});
      box.appendChild(el('div',{style:{fontWeight:'700'}},(s.symbol?'⚙️ '+s.symbol:'⚙️ إعداد عام')+' — '+s.name));
      box.appendChild(el('div',{style:{color:'var(--text2)'}},settingsSummaryText(s.settings)));
      ssSec.appendChild(box);
    });
    rep.appendChild(ssSec);
  }

  return rep;
}
// ════════════════ صفحة "العملات" — فحوصات تشمل كل العملات المخزّنة ════════════════
function rSymbolsPage(){
  const page=el('div',{className:'set-page'});
  page.appendChild(el('div',{className:'set-title'},'🪙 العملات'));
  const S=(t)=>{const s=el('div',{className:'set-section'});s.appendChild(el('div',{className:'set-sec-title'},t));return s;};
  const busy=!!C.btInfo?.busy;
  // زر سهم لطي/فتح جدول نتائج طويل
  const toggleBtn=(key,label)=>{
    const b=el('button',{className:'btn',style:{width:'100%',marginTop:'10px',padding:'10px',fontWeight:'700',fontSize:'12px'}});
    b.textContent=(btSecOpen[key]?'▲ إخفاء ':'▼ عرض ')+label;
    b.onclick=()=>{btSecOpen[key]=!btSecOpen[key];render();};
    return b;
  };

  const sec=S('🎯 احترام المؤشر');
  sec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'10px',lineHeight:'1.8'}},
    `يفحص كل توليفات المؤشر (الفريم، RSI/SMA/EMA، الفترة، وضع الانعكاس، الدايفرجنس — بعتبات Trailing ثابتة شورت 75/3 ولونغ 25/3) لكل عملة على حدة. يجمع كل إشارات الشورت (OB + TS + المؤكدة-شورت) معاً، وكل إشارات اللونغ (OS + TL + المؤكدة-لونغ) معاً، ويحسب لكل جهة «احترام%» = نسبة الإشارات التي تبعها انعكاس ≥${REV_THRESHOLD}% خلال ${REV_LOOKBACK} شموع، و«انعكاس%» = متوسط قوة الانعكاس. يختار لكل عملة التوليفة الأقوى إجمالاً (شورت+لونغ) ويرتب العملات من الأفضل للأضعف.`));

  const btnRow=el('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}});
  const runBtn=el('button',{className:'set-save-btn',style:{width:'auto',padding:'8px 14px',fontSize:'12px',marginTop:'0'}});
  runBtn.disabled=!!(busy||C.btOptimizingRespect);
  runBtn.textContent=C.btOptimizingRespect?'⏳ يفحص...':(busy?'⏳ عملية أخرى تعمل...':'▶️ ابدأ الفحص');
  runBtn.onclick=()=>{
    if(busy){showNotif('⏳ هناك عملية شغّالة بالفعل');return;}
    C.btOptimizingRespect=true;C.btRespectResult=null;C.btProgress={kind:'optRespect',done:0,total:0};
    send('btOptRespect',{});render();
  };
  btnRow.appendChild(runBtn);
  if(C.btOptimizingRespect){
    const stopBtn=el('button',{className:'btn',style:{background:'rgba(255,71,87,.12)',borderColor:'var(--red)',color:'var(--red)',fontWeight:'800',padding:'8px 14px'}});
    stopBtn.textContent='⏹ إيقاف';
    stopBtn.onclick=()=>{send('btStop',{});stopBtn.textContent='⏹ يوقف...';stopBtn.disabled=true;};
    btnRow.appendChild(stopBtn);
  }
  sec.appendChild(btnRow);

  if(C.btProgress?.kind==='optRespect'){
    const p=C.btProgress;const pct=p.total?(p.done/p.total*100):0;
    const prog=el('div',{style:{marginTop:'14px'}});
    const bar=el('div',{className:'prog-bar',style:{height:'8px',borderRadius:'4px',overflow:'hidden'}});
    bar.appendChild(el('div',{id:'bt-optresp-fill',className:'prog-fill',style:{width:pct.toFixed(1)+'%'}}));
    prog.appendChild(bar);
    const stG=el('div',{className:'sgrid2',style:{gridTemplateColumns:'repeat(2,1fr)',marginTop:'8px'}});
    const mkS=(lb,id,v)=>{const c2=el('div',{className:'sc2'});c2.appendChild(el('label',{},lb));c2.appendChild(el('div',{className:'v',id},v));return c2;};
    stG.appendChild(mkS('مكتمل','bt-optresp-pct',pct.toFixed(1)+'%'));
    stG.appendChild(mkS('منقضٍ','bt-optresp-elapsed',fmtTime(p.elapsedMs)));
    prog.appendChild(stG);
    prog.appendChild(el('div',{id:'bt-optresp-count',style:{fontSize:'11px',color:'var(--text2)',marginTop:'8px',textAlign:'center'}},`${p.done||0}/${p.total||0} — ${p.sym||''}`));
    prog.appendChild(el('div',{id:'bt-optresp-live',style:{fontSize:'11px',color:'var(--text2)',marginTop:'6px',textAlign:'center'}},p.best?`أفضل حتى الآن لـ${p.sym}: شورت ${p.best.short?.respectRate??'—'}% · لونغ ${p.best.long?.respectRate??'—'}%`:''));
    sec.appendChild(prog);
  }

  sec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'10px',marginBottom:'4px'}},'📂 (اختياري) استعد نتيجة فحص سابقة بدل إعادة الفحص من الصفر'));
  const restoreInput=el('input',{type:'file',accept:'.json,application/json'});
  restoreInput.onchange=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const d=JSON.parse(rd.result);
        if(!d.bySymbol||!Object.keys(d.bySymbol).length){showNotif('❌ ملف غير صالح — لا يحتوي نتائج لكل عملة');return;}
        const n=Object.keys(d.bySymbol).length;
        C.btRespectResult={bySymbol:d.bySymbol,symbolsScanned:d.symbolsScanned||n,totalSymbols:d.totalSymbols||n,elapsedMs:d.elapsedMs||0};
        saveBtSymState();
        showNotif('✅ تم استعادة نتائج '+n+' عملة');
      }catch(err){showNotif('❌ ملف غير صالح');}
      render();
    };
    rd.readAsText(f);
  };
  restoreInput.onclick=(e)=>{e.target.value='';};
  sec.appendChild(restoreInput);

  if(C.btRespectResult){
    if(C.btRespectResult.error){
      sec.appendChild(el('div',{className:'errbdg',style:{marginTop:'12px'}},'❌ '+C.btRespectResult.error));
    }else{
      const bySym=C.btRespectResult.bySymbol||{};
      const entries=Object.entries(bySym).sort((a,b)=>(b[1].score||0)-(a[1].score||0));
      sec.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'10px'}},`✅ تم فحص ${C.btRespectResult.symbolsScanned}/${C.btRespectResult.totalSymbols} عملة في ${fmtTime(C.btRespectResult.elapsedMs)}. تُرسَل النتائج تلقائياً (ملخص + ملف JSON) إلى قناة الباك تيست على تلغرام عند الانتهاء.`));
      if(entries.length){
        const dlBtn=el('button',{className:'btn',style:{width:'100%',marginTop:'10px',padding:'12px',background:'rgba(46,213,115,.12)',borderColor:'var(--green)',color:'var(--green)',fontWeight:'800'}});
        dlBtn.textContent='⬇️ تنزيل كل النتائج (JSON)';
        dlBtn.onclick=()=>downloadRespectResult();
        sec.appendChild(dlBtn);
        sec.appendChild(toggleBtn('respTbl','الجدول التفصيلي ('+entries.length+' عملة)'));
        if(btSecOpen.respTbl){
        const lbWrap=el('div',{style:{overflowX:'auto',marginTop:'10px'}});
        const tbl=el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'11px'}});
        const thead=el('tr');
        ['#','العملة','المؤشر','احترام شورت%','انعكاس شورت%','ن.شورت','احترام لونغ%','انعكاس لونغ%','ن.لونغ','النتيجة',''].forEach(h=>thead.appendChild(el('th',{style:{padding:'6px 4px',borderBottom:'1px solid var(--border)',color:'var(--text2)',fontWeight:'700',whiteSpace:'nowrap'}},h)));
        tbl.appendChild(thead);
        const td=(v,cl='')=>el('td',{className:cl,style:{padding:'6px 4px',borderBottom:'1px solid var(--border)',textAlign:'center',whiteSpace:'nowrap'}},String(v));
        entries.forEach(([sym,info],i)=>{
          const r=info.recipe||{},sh=info.short||{},lo=info.long||{};
          const row=el('tr');
          row.appendChild(td(i+1));
          row.appendChild(td(sym));
          row.appendChild(td(`${r.interval} ${r.mode}${r.mode!=='RSI'?'('+r.maPeriod+')':''} | ${r.revMode}:${r.revCount}${r.enableDiv?'+div':''}`));
          row.appendChild(td(sh.total?sh.respectRate+'%':'—'));
          row.appendChild(td(sh.total?sh.avgReversalPct+'%':'—','c-green'));
          row.appendChild(td(sh.total||0));
          row.appendChild(td(lo.total?lo.respectRate+'%':'—'));
          row.appendChild(td(lo.total?lo.avgReversalPct+'%':'—','c-green'));
          row.appendChild(td(lo.total||0));
          row.appendChild(td(fmtNum(info.score)));
          const actTd=el('td',{style:{padding:'4px',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'}});
          const tryBtn=el('button',{style:{fontSize:'13px',padding:'2px 6px',marginInlineEnd:'2px',background:'transparent',border:'1px solid var(--border)',borderRadius:'6px',cursor:'pointer'},title:'جرّب وعدّل في Backtest',onClick:()=>{C.page='backtest';applyComboToTest(info);}},'🧪');
          const dlBtn2=el('button',{style:{fontSize:'13px',padding:'2px 6px',marginInlineEnd:'2px',background:'transparent',border:'1px solid var(--border)',borderRadius:'6px',cursor:'pointer'},title:'تنزيل إعداد هذه العملة',onClick:()=>downloadSymbolSettings(sym,info.settings)},'⬇️');
          const chartBtn=el('button',{style:{fontSize:'13px',padding:'2px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:'6px',cursor:'pointer'},title:'تحقق من الشارت',onClick:()=>{C.page='backtest';requestBtChart(sym,info.settings,{source:'persymbol',combo:info.combo,score:info.score});}},'🔍');
          actTd.appendChild(tryBtn);actTd.appendChild(dlBtn2);actTd.appendChild(chartBtn);
          row.appendChild(actTd);
          tbl.appendChild(row);
        });
        lbWrap.appendChild(tbl);sec.appendChild(lbWrap);
        }
      }else{
        sec.appendChild(el('div',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'12px',textAlign:'center'}},'لا توجد نتائج كافية لأي عملة.'));
      }
    }
  }else if(!C.btOptimizingRespect){
    sec.appendChild(el('div',{className:'set-info',style:{marginTop:'10px'}},'⚠️ اضغط «ابدأ الفحص» لفحص كل العملات المخزّنة (فريم الساعة و4 ساعات) وإيجاد أفضل توليفة مؤشر تجعل السعر يحترم الإشارة وينعكس بقوة — لكل عملة على حدة.'));
  }
  page.appendChild(sec);

  // ════════════════ النافذة 1.5: مؤشر العملة (يبحث من الصفر بما فيها عتبات Trailing) ════════════════
  const secT=S('🧬 مؤشر العملة');
  secT.appendChild(el('div',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'10px',lineHeight:'1.8'}},
    `مثل «احترام المؤشر» أعلاه، لكنه لا يثبّت عتبات Trailing RSI على شورت 75/3 ولونغ 25/3 — بل يجرّب كل توليفات المؤشر (الفريم، النوع، الفترة، الانعكاس، الدايفرجنس) مع كل عتبات Trailing الممكنة (بما فيها إيقاف Trailing تماماً)، ويختار لكل عملة التوليفة الكاملة الأقوى من الصفر بحسب احترام% وانعكاس% للشورت واللونغ معاً. فحص أشمل (وأبطأ) من «احترام المؤشر».`));

  const btnRowT=el('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}});
  const runBtnT=el('button',{className:'set-save-btn',style:{width:'auto',padding:'8px 14px',fontSize:'12px',marginTop:'0'}});
  runBtnT.disabled=!!(busy||C.btOptimizingTuned);
  runBtnT.textContent=C.btOptimizingTuned?'⏳ يفحص...':(busy?'⏳ عملية أخرى تعمل...':'▶️ ابدأ الفحص');
  runBtnT.onclick=()=>{
    if(busy){showNotif('⏳ هناك عملية شغّالة بالفعل');return;}

  btnRowT.appendChild(runBtnT);
  if(C.btOptimizingTuned){

    stopBtnT.onclick=()=>{send('btStop',{});stopBtnT.textContent='⏹ يوقف...';stopBtnT.disabled=true;};
    btnRowT.appendChild(stopBtnT);
  }

// إعادة حساب الصفقات «صفقة واحدة بنفس الوقت» من الأنواع المختارة فقط —
// كل إشارة معها نتيجة محاكاة مستقلة (d.signals[].trade)، والإشارات مرتّبة زمنياً أصلاً
function computeBtChartTrades(d,sigTypes){
  const trades=[];
  let busyUntil=-1;
  (d.signals||[]).forEach(s=>{
    if(!sigTypes[s.type]||!s.trade)return;
    if(s.i<=busyUntil)return;
    trades.push({entryIdx:s.trade.entryIdx,exitIdx:s.trade.exitIdx,side:s.side,type:s.type,exitReason:s.trade.exitReason,pnlPct:s.trade.pnlPct});
    busyUntil=s.trade.exitIdx;
  });
  return trades;
}
function computeBtChartMetrics(trades,capFrac){
  const n=trades.length;
  if(!n)return{trades:0,winRate:0,netReturnPct:0};
  let wins=0,equity=1;
  trades.forEach(t=>{if(t.pnlPct>=0)wins++;equity*=(1+(t.pnlPct/100)*capFrac);});
  return{trades:n,winRate:parseFloat((wins/n*100).toFixed(2)),netReturnPct:parseFloat(((equity-1)*100).toFixed(2))};
}
function renderBtChart(){
  if(_btChart){try{_btChart.remove();}catch(e){}_btChart=null;}
  const container=document.getElementById('bt-chart-candles');
  if(!container)return;
  const d=C.btChartData;
  if(!d||d.error||!d.candles?.length)return;
  const sigTypes=getBtChartSigTypes();
  const trades=computeBtChartTrades(d,sigTypes);
  const chart=LightweightCharts.createChart(container,{
    width:container.clientWidth,height:420,
    layout:{background:{color:'transparent'},textColor:'#8892b0'},
    grid:{vertLines:{color:'rgba(255,255,255,.05)'},horzLines:{color:'rgba(255,255,255,.05)'}},
    timeScale:{timeVisible:true,secondsVisible:false,borderColor:'rgba(255,255,255,.08)'},
    rightPriceScale:{borderColor:'rgba(255,255,255,.08)'},
  });
  const candleSeries=chart.addCandlestickSeries({upColor:'#2ed573',downColor:'#ff4757',borderVisible:false,wickUpColor:'#2ed573',wickDownColor:'#ff4757'});
  candleSeries.priceScale().applyOptions({scaleMargins:{top:0.05,bottom:0.25}});
  candleSeries.setData(d.candles.map(c=>({time:Math.floor(c[0]/1000),open:c[1],high:c[2],low:c[3],close:c[4]})));

  const indSeries=chart.addLineSeries({color:'#ffd32a',lineWidth:1,priceScaleId:'ind',lastValueVisible:false,priceLineVisible:false});
  chart.priceScale('ind').applyOptions({scaleMargins:{top:0.78,bottom:0}});
  const indData=[];
  (d.indicator||[]).forEach((v,i)=>{if(v!=null)indData.push({time:Math.floor(d.candles[i][0]/1000),value:v});});
  indSeries.setData(indData);
  indSeries.createPriceLine({price:70,color:'#ff4757',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title:'70'});
  indSeries.createPriceLine({price:30,color:'#3d9fff',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,axisLabelVisible:true,title:'30'});

  const markers=[];
  (d.signals||[]).forEach(s=>{
    if(!sigTypes[s.type])return;
    const m=BT_SIG_MARK[s.type];if(!m)return;
    markers.push({time:Math.floor(d.candles[s.i][0]/1000),position:m.position,color:m.color,shape:m.shape,text:m.text});
  });
  trades.forEach(t=>{
    markers.push({time:Math.floor(d.candles[t.entryIdx][0]/1000),position:t.side==='LONG'?'belowBar':'aboveBar',color:t.side==='LONG'?'#2ed573':'#ff4757',shape:t.side==='LONG'?'arrowUp':'arrowDown',text:t.side==='LONG'?'دخول لونغ':'دخول شورت'});
    const exitColor=t.pnlPct>=0?'#2ed573':'#ff4757';
    markers.push({time:Math.floor(d.candles[t.exitIdx][0]/1000),position:t.side==='LONG'?'aboveBar':'belowBar',color:exitColor,shape:'circle',text:`${t.exitReason} ${t.pnlPct>=0?'+':''}${t.pnlPct}%`});
  });
  markers.sort((a,b)=>a.time-b.time);
  candleSeries.setMarkers(markers);

  chart.timeScale().fitContent();
  _btChart=chart;
}

function btDlText(p){
  if(p.phase==='wait')return `⏳ Binance ${p.status} — انتظار ${p.waitSec}ث (محاولة ${p.attempt}) — ${p.sym||''} ${p.tf||''}`;
  return `${p.doneUnits}/${p.totalUnits} — ${p.sym||''} ${p.tf||''} ${p.candles!=null?'('+p.candles+' شمعة)':''} ${p.error?'⚠️'+p.error:''}`;
}

function updateBtProgress(){
  const p=C.btProgress;if(!p)return false;
  if(p.kind==='download'||p.kind==='update'){
    const fill=document.getElementById('bt-dl-fill'),txt=document.getElementById('bt-dl-txt');
    if(!fill||!txt)return false;
    const pct=p.totalUnits?Math.round(p.doneUnits/p.totalUnits*100):0;
    fill.style.width=pct+'%';
    txt.textContent=(p.kind==='update'?'🔄 ':'⬇️ ')+btDlText(p);
    return true;
  }
  if(p.kind==='optimize'){
    const fill=document.getElementById('bt-opt-fill');if(!fill)return false;
    const pct=p.total?(p.done/p.total*100):0;
    fill.style.width=pct.toFixed(1)+'%';
    const pctEl=document.getElementById('bt-opt-pct');if(pctEl)pctEl.textContent=pct.toFixed(1)+'%';
    const elEl=document.getElementById('bt-opt-elapsed');if(elEl)elEl.textContent=fmtTime(p.elapsedMs);

    const liveEl=document.getElementById('bt-opt-live');
    if(liveEl&&p.best&&p.best.metrics)liveEl.textContent=`أفضل حتى الآن: عائد ${fmtPct(p.best.metrics.netReturnPct)} · نجاح ${p.best.metrics.winRate}% · صفقات ${p.best.metrics.trades}`;

  }
  if(p.kind==='optSym'){
    const fill=document.getElementById('bt-optsym-fill');if(!fill)return false;
    const pct=p.total?(p.done/p.total*100):0;
    fill.style.width=pct.toFixed(1)+'%';

    return true;
  }
  if(p.kind==='optRespect'){
    const fill=document.getElementById('bt-optresp-fill');if(!fill)return false;
    const pct=p.total?(p.done/p.total*100):0;
    fill.style.width=pct.toFixed(1)+'%';
    const pctEl=document.getElementById('bt-optresp-pct');if(pctEl)pctEl.textContent=pct.toFixed(1)+'%';
    const elEl=document.getElementById('bt-optresp-elapsed');if(elEl)elEl.textContent=fmtTime(p.elapsedMs);
    const cntEl=document.getElementById('bt-optresp-count');if(cntEl)cntEl.textContent=`${p.done||0}/${p.total||0} — ${p.sym||''}`;
    const liveEl=document.getElementById('bt-optresp-live');
    if(liveEl&&p.best)liveEl.textContent=`أفضل حتى الآن لـ${p.sym}: شورت ${p.best.short?.respectRate??'—'}% · لونغ ${p.best.long?.respectRate??'—'}%`;
    return true;
  }
  if(p.kind==='optTuned'){
    const fill=document.getElementById('bt-opttuned-fill');if(!fill)return false;
    const pct=p.total?(p.done/p.total*100):0;
    fill.style.width=pct.toFixed(1)+'%';

    if(liveEl&&p.best)liveEl.textContent=`أفضل حتى الآن لـ${p.sym}: شورت ${p.best.short?.respectRate??'—'}% · لونغ ${p.best.long?.respectRate??'—'}%`;

          row.appendChild(td5(t.pnlPct+'%',t.pnlPct>=0?'c-green':'c-red'));
          tbl5.appendChild(row);
        });
        wrap5.appendChild(tbl5);detBody.appendChild(wrap5);
      }else{
        detBody.appendChild(el('div',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'12px',textAlign:'center'}},'لا توجد صفقات بهذه الإعدادات والأنواع المختارة خلال الفترة المخزّنة.'));
      }
      s5.appendChild(detBody);
    }
  }
  page.appendChild(s5);
  return page;
}

const asb=el('div',{className:'as-bar '+(C.settings.autoSend?'on':'off'),onClick:()=>sendSettings({autoSend:!C.settings.autoSend})});asb.appendChild(el('span',{className:'asdot '+(C.settings.autoSend?'on':'off')}));asb.appendChild(document.createTextNode(C.settings.autoSend?'🟢 الإرسال التلقائي: تشغيل':'🔴 الإرسال متوقف'));root.appendChild(asb);
if(C.respectProgress&&!C.respectProgress.done){const rp=C.respectProgress;const pct=Math.round((rp.current/rp.total)*100);const rpBar=el('div',{style:{padding:'6px 14px',background:'rgba(46,213,115,.06)',borderBottom:'1px solid rgba(46,213,115,.2)',display:'flex',alignItems:'center',gap:'10px'}});rpBar.appendChild(el('span',{style:{fontSize:'11px',fontWeight:'700',color:'var(--green)',flexShrink:'0'}},'📊 فحص الاحترام: '+rp.current+'/'+rp.total));const track=el('div',{style:{flex:'1',height:'6px',background:'var(--bg3)',borderRadius:'3px',overflow:'hidden'}});const fill=el('div',{style:{width:pct+'%',height:'100%',background:'var(--green)',borderRadius:'3px',transition:'width .3s'}});track.appendChild(fill);rpBar.appendChild(track);rpBar.appendChild(el('span',{style:{fontSize:'11px',color:'var(--text2)',flexShrink:'0'}},pct+'%'));root.appendChild(rpBar);}
if(C.perSymSTProgress&&!C.perSymSTProgress.done){const pp=C.perSymSTProgress;const pct2=Math.round((pp.current/pp.total)*100);const ppBar=el('div',{style:{padding:'6px 14px',background:'rgba(165,94,234,.06)',borderBottom:'1px solid rgba(165,94,234,.2)',display:'flex',alignItems:'center',gap:'10px'}});ppBar.appendChild(el('span',{style:{fontSize:'11px',fontWeight:'700',color:'var(--purple)',flexShrink:'0'}},'📊 فحص سوبر تريند: '+pp.current+'/'+pp.total));const track2=el('div',{style:{flex:'1',height:'6px',background:'var(--bg3)',borderRadius:'3px',overflow:'hidden'}});const fill2=el('div',{style:{width:pct2+'%',height:'100%',background:'var(--purple)',borderRadius:'3px',transition:'width .3s'}});track2.appendChild(fill2);ppBar.appendChild(track2);ppBar.appendChild(el('span',{style:{fontSize:'11px',color:'var(--text2)',flexShrink:'0'}},pct2+'%'));root.appendChild(ppBar);}
if(C.waitQueue&&C.waitQueue.length){
  const wqBar=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'7px 14px',background:'rgba(255,165,2,.06)',borderBottom:'1px solid rgba(255,165,2,.2)',overflowX:'auto',cursor:'pointer'},onClick:()=>{C.page='subscribers';render();}});
  wqBar.appendChild(el('span',{style:{fontSize:'12px',fontWeight:'800',color:'var(--orange)',flexShrink:'0'}},'⏳ انتظار ('+C.waitQueue.length+'):'));
  const sorted=[...C.waitQueue].sort((a,b)=>(b.reversalPct||0)-(a.reversalPct||0));
  sorted.slice(0,5).forEach(q=>{

if(!C.symbols.length){const ls=el('div',{style:{gridColumn:'1/-1',display:'flex',flexDirection:'column',alignItems:'center',padding:'60px',gap:'14px'}});ls.appendChild(el('div',{style:{width:'48px',height:'48px',border:'3px solid var(--bg3)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite'}}));ls.appendChild(el('div',{style:{color:'var(--text2)',fontSize:'14px'}},'جاري الاتصال بالسيرفر...'));grid.appendChild(ls);}
else if(!list.length){const em=el('div',{style:{gridColumn:'1/-1',textAlign:'center',padding:'60px',color:'var(--text2)'}});em.innerHTML='🔍<br>لا توجد نتائج';grid.appendChild(em);}
else list.forEach(sym=>{const c=rCard(sym);if(c)grid.appendChild(c);});
root.appendChild(grid);root.appendChild(rDrawer());const t=rToast();if(t)root.appendChild(t);}

if(savedToken){C.token=savedToken;C.loggedIn=true;render();connectWS();}else render();
if(localStorage.getItem('autoBackupOn')==='true')startAutoBackup();
