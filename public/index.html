<style>

async function idbGet(k){return new Promise(res=>{const r=indexedDB.open('cheetahBak',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('s');r.onsuccess=e=>{e.target.result.transaction('s','readonly').objectStore('s').get(k).onsuccess=x=>res(x.target.result);};})}

      break;
    case 'state':
      Object.assign(C,msg.data);
      if(msg.data.settings)C.settings={...C.settings,...msg.data.settings};
      // لا render - فقط تحديث البيانات
      break;
    case 'alert':
      C.alerts=[msg.data,...C.alerts].slice(0,200);
      C.toast=msg.data;clearTimeout(toastRef);
      toastRef=setTimeout(()=>{C.toast=null;updateToast();},6000);
      if(C.settings.soundEnabled)playSound(msg.data.color==='confirmed'?'conf':msg.data.color==='purple'?'trail':'n');
      updateAlertBadge();showToast(msg.data);return;
    case 'priceUpdates':
      Object.entries(msg.data).forEach(([sym,d])=>{if(C.symbolData[sym]){C.symbolData[sym].rsi=d.rsi;C.symbolData[sym].zone=d.zone;if(d.error===false)C.symbolData[sym].error=false;}});
      updateCards();return;
    case 'scanning':C.scanning=msg.data;break;
    case 'symbolData':
      Object.assign(C.symbolData, msg.data);
      updateGridOnly();
      return;
    case 'progress':C.progress=msg.data;break;
    case 'settings':C.settings={...C.settings,...msg.data};break;
    case 'symbolSettings':C.symbolSettings=msg.data||{};if(symSetSym)selectSymForSettings(symSetSym);needRender=true;break;
    case 'alerts':C.alerts=msg.data;needRender=true;break;
    case 'trades':C.openTrades=msg.data;needRender=true;break;
    case 'closedTrades':C.closedTrades=msg.data;break;
    case 'accounts':C.accounts=msg.data;break;
    case 'copyOn':C.copyOn=msg.data;needRender=true;break;
    case 'copyLog':C.copyLog=[msg.data,...C.copyLog].slice(0,300);break;
    case 'addAccountResult':
      if(msg.data.success){showForm=false;formAccId=null;fd={name:'',apiKey:'',apiSecret:'',sizeRatio:'5',tag:'personal',isMaster:false};showNotif('✅ تم إضافة الحساب — $'+(msg.data.balance?.toFixed(2)||'—'));needRender=true;}
      else alert('❌ فشل: '+msg.data.error);break;
    case 'testAccountResult':
      if(msg.data.success)alert('✅ الاتصال ناجح — $'+(msg.data.balance?.toFixed(2)||'—'));
      else alert('❌ فشل: '+msg.data.error);break;
    case 'executeResult':{const ok2=(msg.data||[]).filter(r=>r.ok).length;showNotif(ok2>0?'✅ تم التنفيذ في '+ok2+' حساب':'❌ فشل التنفيذ');break;}
    case 'dcaOrders':C.dcaOrders=msg.data;needRender=true;break;
    case 'pendingOrders':C.pendingOrders=msg.data;needRender=true;break;
    case 'sysStatus':C.sysStatus=msg.data;rSysStatusBox();needRender=true;break;
    case 'sentSigs':C.sentSigs=msg.data||{};break;
    case 'manualOrderResult':
      if(msg.data.success)showNotif(`✅ ${msg.data.sym} ${msg.data.side} × ${msg.data.qty} (${msg.data.lev}x) — ${msg.data.acc}`);
      else showNotif('❌ فشل: '+msg.data.error);
      break;
    case 'dcaError':showNotif('❌ '+msg.data);break;
    case 'waitQueue':C.waitQueue=msg.data||[];needRender=true;break;
    case 'reportSent':showNotif('✅ تم إرسال التقرير على تلغرام');break;
    case 'exportData':saveBackupData(msg.data);break;
    case 'importDone':showNotif('✅ تمت الاستعادة — ستُحدَّث البيانات');break;
    case 'ema200':C.ema200=msg.data;updateEMA200Lamp();return;
    case 'superTrend':C.superTrend=msg.data;updateSuperTrendLamp();return;
    case 'btInfo':C.btInfo=msg.data;needRender=true;break;
    case 'btProgress':
      C.btProgress=msg.data;
      if(msg.data.phase==='busy'){C.btDownloading=false;C.btOptimizing=false;showNotif('⏳ هناك عملية شغّالة بالفعل');needRender=true;break;}
      if(msg.data.phase==='stopping')return;
      // إذا لم نكن في صفحة Backtest: حدّث الحالة فقط بدون إعادة رسم الصفحة الحالية
      // (كان يسبب اختفاء/فلاش الشاشة بشكل متكرر أثناء عمل الفحص/الأوبتيمايزر في الخلفية)
      if(C.page!=='backtest')return;
      if(updateBtProgress())return;
      needRender=true;break;
    case 'btDownloadDone':
      C.btDownloading=false;C.btProgress=null;
      showNotif(msg.data.ok?'✅ اكتمل تنزيل البيانات':'❌ '+(msg.data.error||'فشل التنزيل'));
      send('btInfo',{});
      needRender=true;break;
    case 'btResult':C.btRunning=false;C.btResult=msg.data;needRender=true;break;
    case 'btOptDone':C.btOptimizing=false;C.btProgress=null;C.btOptResult=msg.data;needRender=true;break;
    case 'btOptSymDone':C.btOptimizingSym=false;C.btProgress=null;C.btOptSymResult=msg.data;needRender=true;break;
    case 'btSymChartDataDone':
      C.btChartLoading=false;C.btChartData=msg.data;
      if(msg.data.error)showNotif('❌ '+msg.data.error);
      needRender=true;break;
  }
  if(needRender)schedRender();
}

  return C.btChartSigTypes;

// إعادة حساب الصفقات «صفقة واحدة بنفس الوقت» من الأنواع المختارة فقط —
// كل إشارة معها نتيجة محاكاة مستقلة (d.signals[].trade)، والإشارات مرتّبة زمنياً أصلاً
function computeBtChartTrades(d,sigTypes){
  const trades=[];
  let busyUntil=-1;
  (d.signals||[]).forEach(s=>{
    if(!sigTypes[s.type]||!s.trade)return;
    if(s.i<=busyUntil)return;
    trades.push({entryIdx:s.trade.entryIdx,exitIdx:s.trade.exitIdx,side:s.side,type:s.type,exitReason:s.trade.exitReason,pnlPct:s.trade.pnlPct});
    busyUntil=s.trade.exitIdx;
  });
  return trades;
}
function computeBtChartMetrics(trades,capFrac){
  const n=trades.length;
  if(!n)return{trades:0,winRate:0,netReturnPct:0};
  let wins=0,equity=1;
  trades.forEach(t=>{if(t.pnlPct>=0)wins++;equity*=(1+(t.pnlPct/100)*capFrac);});
  return{trades:n,winRate:parseFloat((wins/n*100).toFixed(2)),netReturnPct:parseFloat(((equity-1)*100).toFixed(2))};
}

      legend.appendChild(lg('#ff4757','●','دخول/خروج خاسر'));
      s5.appendChild(legend);

      // فلتر أنواع الإشارات المعروضة على الشارت — الصفقات والنتيجة الإجمالية
      // أدناه تُحسب من الأنواع المختارة فقط (صفقة واحدة بنفس الوقت تُغلق
      // بربح أو وقف خسارة قبل فتح التالية من الأنواع المختارة)
      const sigTypes=getBtChartSigTypes();
      const filterBox=el('div',{style:{marginTop:'10px',padding:'10px',background:'var(--bg3)',borderRadius:'8px'}});
      filterBox.appendChild(el('div',{style:{fontWeight:'800',fontSize:'12px',marginBottom:'6px'}},'🎛️ الإشارات المعروضة على الشارت (الصفقات والنتيجة الإجمالية أدناه تُحسب من المختار فقط — صفقة واحدة بنفس الوقت):'));
      const filterGrid=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px',fontSize:'11px'}});
      Object.keys(BT_SIG_MARK).forEach(type=>{
        const m=BT_SIG_MARK[type];
        const lbl=el('label',{style:{display:'flex',alignItems:'center',gap:'4px',cursor:'pointer',whiteSpace:'nowrap'}});
        const cb=el('input',{type:'checkbox',checked:sigTypes[type]!==false});
        cb.onchange=()=>{sigTypes[type]=cb.checked;render();};
        lbl.appendChild(cb);
        lbl.appendChild(el('span',{style:{color:m.color,fontWeight:'800'}},m.text));
        lbl.appendChild(document.createTextNode(m.label));
        filterGrid.appendChild(lbl);
      });
      filterBox.appendChild(filterGrid);
      s5.appendChild(filterBox);

      const trades=computeBtChartTrades(C.btChartData,sigTypes);
      const cd=C.btChartData.candles;
      const capFrac=(parseFloat(String(req.settings.cxAmt).replace('%',''))||1)/100;
      const mm=computeBtChartMetrics(trades,capFrac);
      const statsG=el('div',{className:'sgrid2',style:{gridTemplateColumns:'repeat(3,1fr)',marginTop:'10px'}});
      const mkStat=(lb,v,cl='')=>{const c2=el('div',{className:'sc2'});c2.appendChild(el('label',{},lb));c2.appendChild(el('div',{className:'v '+cl},String(v)));return c2;};
      statsG.appendChild(mkStat('صفقات (محسوبة)',String(mm.trades)));
      statsG.appendChild(mkStat('نجاح',mm.winRate+'%'));
      statsG.appendChild(mkStat('إجمالي العائد',mm.netReturnPct+'%',mm.netReturnPct>=0?'c-green':'c-red'));
      s5.appendChild(statsG);

      if(trades.length){
        s5.appendChild(el('div',{className:'set-sec-title',style:{marginTop:'14px',border:'none',paddingBottom:'0'}},`📋 الصفقات (${trades.length})`));
        const wrap5=el('div',{style:{overflowX:'auto',maxHeight:'300px',overflowY:'auto'}});
        const tbl5=el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'11px'}});
        const thead5=el('tr');
        ['#','نوع','جهة','دخول (UTC)','خروج (UTC)','السبب','العائد%'].forEach(h=>thead5.appendChild(el('th',{style:{padding:'6px 4px',borderBottom:'1px solid var(--border)',color:'var(--text2)',fontWeight:'700',position:'sticky',top:'0',background:'var(--bg2)',whiteSpace:'nowrap'}},h)));
        tbl5.appendChild(thead5);
        const td5=(v,cl='')=>el('td',{className:cl,style:{padding:'6px 4px',borderBottom:'1px solid var(--border)',textAlign:'center',whiteSpace:'nowrap'}},String(v));
        const fmtUTC=(ms)=>{const dt=new Date(ms);return dt.getUTCFullYear()+'-'+String(dt.getUTCMonth()+1).padStart(2,'0')+'-'+String(dt.getUTCDate()).padStart(2,'0')+' '+String(dt.getUTCHours()).padStart(2,'0')+':'+String(dt.getUTCMinutes()).padStart(2,'0');};
        trades.forEach((t,i)=>{
          const row=el('tr');
          row.appendChild(td5(i+1));
          row.appendChild(td5(t.type||'—'));
          row.appendChild(td5(t.side==='LONG'?'🟢 لونغ':'🔴 شورت'));
          row.appendChild(td5(fmtUTC(cd[t.entryIdx][0])));
          row.appendChild(td5(fmtUTC(cd[t.exitIdx][0])));
          row.appendChild(td5(t.exitReason));
          row.appendChild(td5(t.pnlPct+'%',t.pnlPct>=0?'c-green':'c-red'));
          tbl5.appendChild(row);
        });
        wrap5.appendChild(tbl5);s5.appendChild(wrap5);
      }else{
        s5.appendChild(el('div',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'12px',textAlign:'center'}},'لا توجد صفقات بهذه الإعدادات والأنواع المختارة خلال الفترة المخزّنة.'));
      }
    }
  }
  page.appendChild(s5);
  return page;
}
function render(){
  // حفظ موقع الـ scroll
  const scrollY=window.scrollY;
  const root=document.getElementById('root');if(needsSetup()){root.innerHTML='';root.appendChild(rServerSetup());return;}if(!C.loggedIn){root.innerHTML='';root.appendChild(rLogin());return;}const ae=document.activeElement;const typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='SELECT'||ae.tagName==='TEXTAREA');if(typing&&C.page==='dashboard'&&root.querySelector('.dash-hdr')){const st=getStats();const sv=root.querySelectorAll('.sval');if(sv.length>=5){sv[0].textContent=st.ob;sv[1].textContent=st.os;sv[2].textContent=st.conf;sv[3].textContent=st.trail;sv[4].textContent=st.total;}if(C.progress>0){const pb=root.querySelector('.prog-bar');if(pb){const pf=pb.querySelector('.prog-fill');if(pf)pf.style.width=C.progress+'%';}}const grid=root.querySelector('.grid');if(grid){const list=getList();const ng=el('div',{className:'grid'});list.forEach(sym=>{const c=rCard(sym);if(c)ng.appendChild(c);});grid.parentNode.replaceChild(ng,grid);}const ot=root.querySelector('.toast');const nt=rToast();if(ot&&nt)ot.parentNode.replaceChild(nt,ot);else if(ot&&!nt)ot.remove();else if(!ot&&nt)root.appendChild(nt);return;}
root.innerHTML='';root.appendChild(rNav());
// عرض popup التقرير فوق الصفحة الحالية
if(reportAccId){const racc=C.accounts.find(a=>a.id===reportAccId);if(racc){const pop=rReportPopup(racc);document.body.appendChild(pop);}}
if(C.page==='settings'){root.appendChild(rSettingsPage());const t=rToast();if(t)root.appendChild(t);return;}
if(C.page==='subscribers'){root.appendChild(rSubPage());const t=rToast();if(t)root.appendChild(t);return;}
if(C.page==='backtest'){root.appendChild(rBacktestPage());const t=rToast();if(t)root.appendChild(t);renderBtChart();return;}
const st=getStats();root.appendChild(rDashHdr(st));
const asb=el('div',{className:'as-bar '+(C.settings.autoSend?'on':'off'),onClick:()=>sendSettings({autoSend:!C.settings.autoSend})});asb.appendChild(el('span',{className:'asdot '+(C.settings.autoSend?'on':'off')}));asb.appendChild(document.createTextNode(C.settings.autoSend?'🟢 الإرسال التلقائي: تشغيل':'🔴 الإرسال متوقف'));root.appendChild(asb);
if(C.waitQueue&&C.waitQueue.length){
  const wqBar=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'7px 14px',background:'rgba(255,165,2,.06)',borderBottom:'1px solid rgba(255,165,2,.2)',overflowX:'auto',cursor:'pointer'},onClick:()=>{C.page='subscribers';render();}});
  wqBar.appendChild(el('span',{style:{fontSize:'12px',fontWeight:'800',color:'var(--orange)',flexShrink:'0'}},'⏳ انتظار ('+C.waitQueue.length+'):'));
  const sorted=[...C.waitQueue].sort((a,b)=>(b.reversalPct||0)-(a.reversalPct||0));
  sorted.slice(0,5).forEach(q=>{
    const chip=el('div',{style:{display:'flex',alignItems:'center',gap:'4px',padding:'3px 9px',background:'rgba(255,165,2,.1)',border:'1px solid rgba(255,165,2,.3)',borderRadius:'20px',fontSize:'11px',fontWeight:'700',whiteSpace:'nowrap',flexShrink:'0'}});
    chip.appendChild(el('span',{style:{color:q.side==='LONG'?'var(--green)':'var(--red)'}},q.side==='LONG'?'🟢':'🔴'));
    chip.appendChild(el('span',{style:{color:'var(--text)'}},q.symbol.replace('USDT','')));
    if(q.reversalPct>0)chip.appendChild(el('span',{style:{color:'var(--orange)'}},'+'+q.reversalPct.toFixed(1)+'%'));
    wqBar.appendChild(chip);
  });
  if(sorted.length>5)wqBar.appendChild(el('span',{style:{fontSize:'11px',color:'var(--text2)',flexShrink:'0'}},'+'+(sorted.length-5)+' أكثر'));
  root.appendChild(wqBar);
}
if(C.progress>0){const pb=el('div',{className:'prog-bar'});const pf=el('div',{className:'prog-fill'});pf.style.width=C.progress+'%';pb.appendChild(pf);root.appendChild(pb);}
const leg=el('div',{className:'legend'});leg.appendChild(el('span',{style:{fontWeight:'700'}},'الإشارات:'));[['c-red','🔴 تجاوز 70'],['c-orange','🟠 نزل من 70'],['c-blue','🔵 نزل من 30'],['c-green','🟢 صعد من 30'],['c-confirmed','⚡ أكيدة'],['c-purple','🟣 Trailing']].forEach(([c,lb])=>leg.appendChild(el('span',{className:c},lb)));root.appendChild(leg);
const gi=el('div',{className:'ginfo'});gi.appendChild(el('span',{},`عرض ${getList().length} من ${C.symbols.length} عملة`));gi.appendChild(el('span',{className:'c-purple'},C.wsConn?'⚡ Live':'📡 REST'));root.appendChild(gi);
const grid=el('div',{className:'grid'});const list=getList();
if(!C.symbols.length){const ls=el('div',{style:{gridColumn:'1/-1',display:'flex',flexDirection:'column',alignItems:'center',padding:'60px',gap:'14px'}});ls.appendChild(el('div',{style:{width:'48px',height:'48px',border:'3px solid var(--bg3)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite'}}));ls.appendChild(el('div',{style:{color:'var(--text2)',fontSize:'14px'}},'جاري الاتصال بالسيرفر...'));grid.appendChild(ls);}
else if(!list.length){const em=el('div',{style:{gridColumn:'1/-1',textAlign:'center',padding:'60px',color:'var(--text2)'}});em.innerHTML='🔍<br>لا توجد نتائج';grid.appendChild(em);}
else list.forEach(sym=>{const c=rCard(sym);if(c)grid.appendChild(c);});
root.appendChild(grid);root.appendChild(rDrawer());const t=rToast();if(t)root.appendChild(t);}
const savedToken=localStorage.getItem('rsi_token');
if(savedToken){C.token=savedToken;C.loggedIn=true;render();connectWS();}else render();
if(localStorage.getItem('autoBackupOn')==='true')startAutoBackup();

</script>
