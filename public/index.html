<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>RSI Scanner Pro v3</title>
<style>
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--bg4:#1e2d45;
  --accent:#00e5ff;--red:#ff4757;--orange:#ffa502;--blue:#3d9fff;
  --green:#2ed573;--yellow:#ffd32a;--purple:#a55eea;--confirmed:#00e5ff;
  --text:#e8eaf6;--text2:#8892b0;--border:rgba(255,255,255,0.08);--card:rgba(255,255,255,0.03);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(0,229,255,.3)}50%{box-shadow:0 0 14px rgba(0,229,255,.7)}}
@keyframes slidein{from{transform:translateX(-110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.login-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,#0d1b2a,#050810);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:360px;max-width:100%;text-align:center;box-shadow:0 0 60px rgba(0,229,255,.1)}
.login-box.shake{animation:shake .4s ease}
.login-form{display:flex;flex-direction:column;gap:12px}
.login-inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:15px;text-align:center;outline:none;transition:border-color .2s;width:100%}
.login-inp:focus{border-color:var(--accent)}.login-inp.err{border-color:var(--red)!important}.login-inp.pw{letter-spacing:5px;font-size:18px}
.login-btn{background:linear-gradient(135deg,var(--accent),#0077ff);color:#000;font-weight:800;border:none;border-radius:10px;padding:13px;font-size:15px;cursor:pointer}
.login-err{color:var(--red);font-size:12px;font-weight:600;min-height:16px}

.navbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:stretch;position:sticky;top:0;z-index:200;height:46px}
.ntab{background:none;border:none;border-bottom:3px solid transparent;color:var(--text2);padding:0 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}
.ntab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.ntab.dash{color:var(--accent);border-bottom-color:var(--accent)}
.ntab.sub{color:var(--green);border-bottom-color:var(--green)}
.nbadge{background:var(--green);color:#000;border-radius:8px;font-size:9px;padding:1px 6px;font-weight:800}
.nav-right{margin-right:auto;display:flex;align-items:center;gap:10px;padding:0 14px}
.copy-pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;transition:all .2s}
.copy-pill.on{background:rgba(46,213,115,.1);border-color:var(--green);color:var(--green)}
.copy-pill.off{background:rgba(255,71,87,.07);border-color:rgba(255,71,87,.4);color:var(--red)}
.cpd{width:7px;height:7px;border-radius:50%;display:inline-block}
.cpd.on{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s infinite}
.cpd.off{background:var(--red)}
.ws-conn{font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px}
.ws-conn.on{color:var(--green);background:rgba(46,213,115,.1)}
.ws-conn.off{color:var(--red);background:rgba(255,71,87,.08)}

.dash-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.dr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.logo-t{font-size:15px;font-weight:800;color:var(--accent)}
.logo-s{font-size:10px;color:var(--text2)}
.sbox{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:5px 10px;text-align:center;min-width:62px}
.slbl{font-size:9px;color:var(--text2)}
.sval{font-size:16px;font-weight:800;line-height:1.2}
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
.sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;outline:none}
.mbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .2s}
.mbtn.ar{background:rgba(255,71,87,.15);border-color:var(--red);color:var(--red)}
.mbtn.as{background:rgba(0,229,255,.12);border-color:var(--accent);color:var(--accent)}
.mbtn.ae{background:rgba(255,165,2,.12);border-color:var(--orange);color:var(--orange)}
.fbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .2s}
.fbtn.active{background:rgba(0,229,255,.12);border-color:var(--accent);color:var(--accent)}
.chkr{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap}
.chkr input{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}
.ninp{width:52px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 8px;font-size:12px;text-align:center;outline:none}
.sinp{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:6px 14px;font-size:13px;width:155px;outline:none}
.sinp:focus{border-color:var(--accent)}
.as-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 14px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);cursor:pointer}
.as-bar.on{background:rgba(46,213,115,.07);color:var(--green)}.as-bar.off{background:rgba(255,71,87,.06);color:var(--red)}
.asdot{width:8px;height:8px;border-radius:50%}
.asdot.on{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1s infinite}
.asdot.off{background:var(--red)}
.prog-bar{height:3px;background:var(--bg3)}.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .3s}
.legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:6px 14px;font-size:11px;background:var(--bg2);border-bottom:1px solid var(--border)}
.ginfo{padding:5px 14px;font-size:11px;color:var(--text2);display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:10px;padding:10px 14px 80px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;transition:transform .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.card.ob{border-color:rgba(255,71,87,.35);background:rgba(255,71,87,.04)}
.card.os{border-color:rgba(61,159,255,.35);background:rgba(61,159,255,.04)}
.card.conf{border-color:rgba(0,229,255,.5);background:rgba(0,229,255,.05);animation:pulse 2s infinite}
.card.trail{border-color:rgba(165,94,234,.4);background:rgba(165,94,234,.04)}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.csym{font-size:12px;font-weight:700}.csym span{font-size:8px;color:var(--text2);font-weight:400}
.cbdg{display:flex;gap:3px}
.bdg{border-radius:4px;font-size:8px;padding:1px 5px;font-weight:700}
.b-ob{background:rgba(255,71,87,.2);border:1px solid var(--red);color:var(--red)}
.b-os{background:rgba(61,159,255,.2);border:1px solid var(--blue);color:var(--blue)}
.b-tr{background:rgba(165,94,234,.2);border:1px solid var(--purple);color:var(--purple)}
.b-lv{background:rgba(46,213,115,.15);border:1px solid var(--green);color:var(--green);animation:blink 1.5s infinite}
.b-op{background:rgba(255,211,42,.15);border:1px solid var(--yellow);color:var(--yellow)}
.cvr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px}
.crsi{font-size:22px;font-weight:800;line-height:1}
.cdelta{font-size:11px;font-weight:600}
.rbar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:2px}
.rfill{height:100%;border-radius:3px;transition:width .5s}
.rtick{display:flex;justify-content:space-between;font-size:7px;color:var(--text2);margin-bottom:4px}
.sbdg{border-radius:6px;padding:3px 8px;font-size:9px;font-weight:700;text-align:center}
.s-red{background:rgba(255,71,87,.15);border:1px solid var(--red);color:var(--red)}
.s-orange{background:rgba(255,165,2,.15);border:1px solid var(--orange);color:var(--orange)}
.s-blue{background:rgba(61,159,255,.15);border:1px solid var(--blue);color:var(--blue)}
.s-green{background:rgba(46,213,115,.15);border:1px solid var(--green);color:var(--green)}
.s-conf{background:rgba(0,229,255,.15);border:1px solid var(--confirmed);color:var(--confirmed);animation:pulse 1.5s infinite}
.s-purple{background:rgba(165,94,234,.15);border:1px solid var(--purple);color:var(--purple)}
.errbdg{font-size:10px;color:var(--orange);background:rgba(255,165,2,.08);border:1px solid rgba(255,165,2,.3);border-radius:6px;padding:4px 8px;text-align:center}
.lspin{display:inline-block;width:10px;height:10px;border:1.5px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
.volm{font-size:9px;color:var(--text2);text-align:center;margin-top:4px}
.c-red{color:var(--red)}.c-orange{color:var(--orange)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}.c-purple{color:var(--purple)}.c-confirmed{color:var(--confirmed)}.c-text2{color:var(--text2)}

.drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:100%;background:var(--bg2);border-left:1px solid var(--border);z-index:300;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.6)}
.drawer.open{transform:none}
.dhdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;flex-wrap:wrap}
.dtabs{display:flex;gap:5px;flex-wrap:wrap}
.dtab{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .2s}
.dtab.aa{background:rgba(0,229,255,.12);border-color:var(--accent);color:var(--accent)}
.dtab.at{background:rgba(46,213,115,.12);border-color:var(--green);color:var(--green)}
.dtab.as2{background:rgba(165,94,234,.12);border-color:var(--purple);color:var(--purple)}
.dtab.ae2{background:rgba(255,165,2,.12);border-color:var(--orange);color:var(--orange)}
.dbody{flex:1;overflow-y:auto;padding:10px}
.ai{border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.ai.red{background:rgba(255,71,87,.07);border-color:rgba(255,71,87,.3)}
.ai.orange{background:rgba(255,165,2,.07);border-color:rgba(255,165,2,.3)}
.ai.blue{background:rgba(61,159,255,.07);border-color:rgba(61,159,255,.3)}
.ai.green{background:rgba(46,213,115,.07);border-color:rgba(46,213,115,.3)}
.ai.confirmed{background:rgba(0,229,255,.05);border-color:rgba(0,229,255,.4)}
.ai.purple{background:rgba(165,94,234,.05);border-color:rgba(165,94,234,.3)}
.tcard{border-radius:12px;padding:12px;border:1px solid;margin-bottom:10px}
.tcard.long{background:rgba(46,213,115,.05);border-color:rgba(46,213,115,.3)}
.tcard.short{background:rgba(255,71,87,.05);border-color:rgba(255,71,87,.3)}
.stabs{display:flex;gap:4px;margin-bottom:10px}
.stab{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px;font-size:11px;cursor:pointer;text-align:center;transition:all .2s}
.stab.active{background:rgba(165,94,234,.15);border-color:var(--purple);color:var(--purple)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.sc label{font-size:10px;color:var(--text2);display:block;margin-bottom:4px}
.sc .v{font-size:18px;font-weight:800}
.toast{position:fixed;bottom:20px;left:14px;background:var(--bg2);border:1.5px solid;border-radius:14px;padding:14px 18px;min-width:240px;max-width:320px;z-index:400;cursor:pointer;animation:slidein .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.toast.red{border-color:var(--red)}.toast.orange{border-color:var(--orange)}.toast.blue{border-color:var(--blue)}.toast.green{border-color:var(--green)}
.toast.confirmed{border-color:var(--confirmed);box-shadow:0 4px 20px rgba(0,229,255,.4)}.toast.purple{border-color:var(--purple)}
.blkbdg{display:inline-block;background:rgba(255,71,87,.15);border:1px solid var(--red);color:var(--red);border-radius:5px;font-size:9px;padding:2px 6px}

/* ══ صفحة المشتركين ══ */
.sub-page{padding:16px;max-width:980px;margin:0 auto;padding-bottom:60px}
.sub-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.sub-title{font-size:19px;font-weight:800;display:flex;align-items:center;gap:10px}
.sub-acts{display:flex;gap:8px;flex-wrap:wrap}
.csw{display:flex;align-items:center;gap:14px;padding:14px 20px;border-radius:14px;border:2px solid;cursor:pointer;margin-bottom:14px;user-select:none;transition:all .2s}
.csw.on{background:rgba(46,213,115,.07);border-color:var(--green)}.csw.off{background:rgba(255,71,87,.05);border-color:rgba(255,71,87,.35)}
.csw-tog{width:52px;height:28px;border-radius:14px;position:relative;flex-shrink:0;transition:background .3s}
.csw-tog.on{background:var(--green)}.csw-tog.off{background:rgba(255,71,87,.5)}
.csw-knob{position:absolute;top:4px;width:20px;height:20px;background:#fff;border-radius:50%;transition:all .3s;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.csw-knob.on{right:4px}.csw-knob.off{left:4px}
.em-btn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(255,71,87,.2),rgba(255,71,87,.1));border:2px solid var(--red);color:var(--red);border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.em-btn:hover{background:rgba(255,71,87,.3)}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px;margin-bottom:20px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.ov-label{font-size:10px;color:var(--text2);margin-bottom:5px}.ov-val{font-size:22px;font-weight:800}
.acc-card{background:var(--bg2);border-radius:18px;margin-bottom:16px;overflow:hidden;border:1px solid var(--border)}
.acc-card.master{border-color:rgba(0,229,255,.3);box-shadow:0 4px 24px rgba(0,229,255,.07)}
.acc-card.disabled{opacity:.68}
.acc-head{padding:13px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.05)}
.acc-head.m{background:linear-gradient(135deg,rgba(0,229,255,.06),rgba(61,159,255,.03))}.acc-head.f{background:rgba(255,255,255,.01)}
.acc-name-row{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.acc-mbdg{font-size:9px;font-weight:800;color:#000;background:linear-gradient(90deg,var(--accent),#0077ff);padding:2px 10px;border-radius:10px}
.acc-name{font-size:15px;font-weight:800}
.acc-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700}
.acc-tag.personal{background:rgba(0,229,255,.15);color:var(--accent);border:1px solid rgba(0,229,255,.3)}
.acc-tag.family{background:rgba(46,213,115,.15);color:var(--green);border:1px solid rgba(46,213,115,.3)}
.acc-tag.other{background:rgba(255,165,2,.15);color:var(--orange);border:1px solid rgba(255,165,2,.3)}
.api-ind{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;cursor:pointer;transition:all .2s;white-space:nowrap}
.api-ind.ok{background:rgba(46,213,115,.1);border-color:rgba(46,213,115,.35);color:var(--green)}
.api-ind.fail{background:rgba(255,71,87,.1);border-color:rgba(255,71,87,.35);color:var(--red)}
.api-ind.checking{background:rgba(255,165,2,.1);border-color:rgba(255,165,2,.35);color:var(--orange)}
.api-ind.unknown{background:var(--bg3);border-color:var(--border);color:var(--text2)}
.apidot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.apidot.ok{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
.apidot.fail{background:var(--red)}.apidot.checking{background:var(--orange);animation:blink .6s infinite}.apidot.unknown{background:var(--text2)}
.acc-btns{display:flex;gap:6px;flex-wrap:wrap}
.abtn{font-size:10px;padding:4px 12px;border-radius:8px;border:1px solid;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap;background:none}
.abtn.ton{background:rgba(46,213,115,.1);border-color:var(--green);color:var(--green)}.abtn.toff{background:rgba(255,71,87,.1);border-color:var(--red);color:var(--red)}
.abtn.edit{background:rgba(255,165,2,.1);border-color:var(--orange);color:var(--orange)}.abtn.ref{background:rgba(61,159,255,.1);border-color:var(--blue);color:var(--blue)}
.abtn.del{background:rgba(255,71,87,.06);border-color:rgba(255,71,87,.4);color:var(--red)}.abtn.test{background:rgba(165,94,234,.1);border-color:var(--purple);color:var(--purple)}
.qs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:8px;margin-bottom:16px}
.qs{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px}
.qs-icon{font-size:15px;margin-bottom:3px}.qs-lbl{font-size:9px;color:var(--text2);margin-bottom:3px}.qs-val{font-size:17px;font-weight:800}
.ptable{background:rgba(0,0,0,.22);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06);margin-bottom:12px}
.pt-title{padding:9px 14px;font-size:11px;font-weight:700;color:var(--text2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
.pt-head,.pt-row{display:grid;grid-template-columns:85px 75px 80px 48px 88px 88px 80px 68px;padding:8px 14px;align-items:center;gap:4px}
.pt-head{background:rgba(255,255,255,.03);font-size:9px;color:var(--text2);font-weight:700}
.pt-row{transition:background .15s}.pt-row:hover{background:rgba(255,255,255,.02)}
.pt-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,.03)}
.pt-sym{font-weight:800;font-size:12px}.pt-sym span{font-size:8px;color:var(--text2);font-weight:400}
.pt-long{font-weight:700;font-size:11px;color:var(--green)}.pt-short{font-weight:700;font-size:11px;color:var(--red)}
.pt-lev{font-size:11px;color:var(--orange);font-weight:600}.pt-num{font-size:11px;color:var(--text2)}
.pt-pnl{display:flex;flex-direction:column;gap:1px}
.pt-pos{font-size:13px;font-weight:800;color:var(--green)}.pt-neg{font-size:13px;font-weight:800;color:var(--red)}
.no-pos{text-align:center;padding:18px;color:var(--text2);font-size:12px}
.api-bar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;padding:10px 14px;background:rgba(0,0,0,.18);border-radius:10px;font-size:10px;color:var(--text2);margin-top:4px}
.api-bar-acts{display:flex;gap:6px;margin-right:auto}
.add-form{background:var(--bg3);border:1px dashed rgba(0,229,255,.3);border-radius:14px;padding:16px;margin-bottom:16px}
.af-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px}
.af-notice{border-radius:8px;padding:9px 12px;font-size:11px;line-height:1.7;margin-bottom:10px}
.af-notice.m{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);color:var(--accent)}

.aff input.mono{font-family:monospace;font-size:11px;letter-spacing:.5px}

.af-btns{display:flex;gap:8px}

.log-row{display:flex;gap:10px;align-items:flex-start;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.log-row:last-child{border-bottom:none}

@media(max-width:480px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));padding:8px 8px 80px}.drawer{width:100%}.ntab{padding:0 11px;font-size:12px}.pt-head,.pt-row{grid-template-columns:70px 65px 65px 40px 72px 72px 66px 56px;font-size:9px}.qs-grid{grid-template-columns:repeat(2,1fr)}.ov-grid{grid-template-columns:repeat(2,1fr)}}

<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════
//  SERVER CONFIG — عدّل هذا الرابط بعد رفع السيرفر على Railway
// ═══════════════════════════════════════════════
// لو شغّلت محلياً: اتركه فاضي ← يتصل بنفس الجهاز
// لو على Vercel: ضع رابط Railway مثل: https://rsi-scanner.up.railway.app
const SERVER_URL = localStorage.getItem('rsi_server') || '';

function getServerUrl() {
  const saved = localStorage.getItem('rsi_server');
  return saved ? saved.replace(/\/$/, '') : '';
}

function getApiUrl(path) {
  const base = getServerUrl();
  return base ? `${base}${path}` : path;
}

function getWsUrl() {
  const base = getServerUrl();
  if (base) {
    return base.replace('https://', 'wss://').replace('http://', 'ws://');
  }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}`;
}

// ═══════════════════════════════════════════════
//  CLIENT STATE
// ═══════════════════════════════════════════════
const C = {
  token: null,
  loggedIn: false,
  page: 'dashboard',
  wsConn: false,
  symbols: [], symbolData: {}, symbolMeta: {},
  alerts: [], openTrades: [], closedTrades: [],
  settings: {
    mode:'SMA',maPeriod:14,interval:'1h',autoSend:false,enableDiv:true,blockOpen:true,
    cxMargin:'Cross',cxLev:'20',cxAmt:'5%',cxSLon:true,cxSL:'2',
    cxTP1:'3',cxTP1Amt:'50',cxTP2on:false,cxTP2:'6',cxTP2Amt:'50',
    cxTrailTp:'off',cxTrailPct:'0.5',cxEntryTrail:'0.5%',
    cxToken:'',cxChat:'',cxChatClose:'',
    trSon:false,trSstart:75,trSgap:3,trLon:false,trLstart:25,trLgap:3,
    liqVon:false,liqVmin:50000000,liqOon:false,liqOmin:10000000,
    revMode:'candles',revCount:1,rsiGap:1,dataMode:'ws',soundEnabled:true,
  },
  copyOn: false,
  copyLog: [],
  accounts: [],
  drawerOpen: false,
  activeTab: 'alerts',
  settingsOpen: false,
  progress: 0,
  scanning: false,
  lastUpdate: '',
  toast: null,
  filter: 'all', sortBy: 'rsi', search: '',
  statsPeriod: 'today',
  sentSigs: {},
};

// UI state
let showForm=false, formAccId=null, showLog=false, editAcc=null;
let fd={name:'',apiKey:'',apiSecret:'',sizeRatio:'5',tag:'personal',isMaster:false};
let audioCtx=null, toastRef=null;
let rPend=false;

// ═══════════════════════════════════════════════
//  WEBSOCKET TO SERVER
// ═══════════════════════════════════════════════
let ws=null, wsReconn=null;

function connectWS() {
  if(ws) return;
  ws = new WebSocket(getWsUrl());
  ws.onopen = () => { C.wsConn=true; render(); };
  ws.onclose = () => { C.wsConn=false; ws=null; render(); wsReconn=setTimeout(connectWS,3000); };
  ws.onerror = () => {};
  ws.onmessage = (ev) => {
    try { const msg = JSON.parse(ev.data); handleServerMsg(msg); } catch(e) {}
  };
}

function send(type, data) {
  if(ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type, data}));
}

function handleServerMsg(msg) {
  switch(msg.type) {
    case 'init':
      Object.assign(C, msg.data);
      if(msg.data.settings) C.settings = msg.data.settings;
      break;
    case 'state':
      Object.assign(C, msg.data);
      if(msg.data.settings) C.settings = msg.data.settings;
      break;
    case 'alert':
      C.alerts = [msg.data, ...C.alerts].slice(0,200);
      C.toast = msg.data;
      clearTimeout(toastRef);
      toastRef = setTimeout(()=>{C.toast=null;render();},6000);
      if(C.settings.soundEnabled) playSound(msg.data.color==='confirmed'?'conf':msg.data.color==='purple'?'trail':'n');
      break;
    case 'priceUpdates':
      Object.entries(msg.data).forEach(([sym,d])=>{
        if(C.symbolData[sym]) {
          C.symbolData[sym].rsi = d.rsi;
          C.symbolData[sym].zone = d.zone;
        }
      });
      schedRender(); return;
    case 'wsStatus':
      break;
    case 'scanning':
      C.scanning = msg.data; break;
    case 'progress':
      C.progress = msg.data; break;
    case 'settings':
      C.settings = msg.data; break;
    case 'alerts':
      C.alerts = msg.data; break;
    case 'trades':
      C.openTrades = msg.data; break;
    case 'closedTrades':
      C.closedTrades = msg.data; break;
    case 'accounts':
      C.accounts = msg.data; break;
    case 'copyOn':
      C.copyOn = msg.data; break;
    case 'copyLog':
      C.copyLog = [msg.data, ...C.copyLog].slice(0,300); break;
    case 'addAccountResult':
      if(msg.data.success) {
        showForm=false; formAccId=null;
        fd={name:'',apiKey:'',apiSecret:'',sizeRatio:'5',tag:'personal',isMaster:false};
        alert(`✅ تم إضافة الحساب — الرصيد: $${msg.data.balance?.toFixed(2)||'—'}`);
      } else {
        alert(`❌ فشل: ${msg.data.error}`);
      }
      break;
    case 'testAccountResult':
      if(msg.data.success) alert(`✅ الاتصال ناجح — الرصيد: $${msg.data.balance?.toFixed(2)||'—'}`);
      else alert(`❌ فشل الاتصال: ${msg.data.error}`);
      break;
  }
  render();
}

function schedRender() { if(!rPend){rPend=true;requestAnimationFrame(()=>{rPend=false;render();});} }
function sendSettings(patch) { Object.assign(C.settings, patch); send('updateSettings', C.settings); render(); }

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
async function doLogin(user, pass) {
  try {
    const res = await fetch(getApiUrl('/api/login'), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const d = await res.json();
    if(d.token) {
      C.token = d.token;
      localStorage.setItem('rsi_token', d.token);
      C.loggedIn = true;
      connectWS();
      render();
    } else { return false; }
    return true;
  } catch(e) { return false; }
}

// ═══════════════════════════════════════════════
//  SOUND
// ═══════════════════════════════════════════════
function playSound(t) {
  try {
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    const n=audioCtx.currentTime;
    if(t==='conf'){o.type='triangle';o.frequency.setValueAtTime(587,n);o.frequency.setValueAtTime(880,n+.15);g.gain.setValueAtTime(.2,n);g.gain.exponentialRampToValueAtTime(.01,n+.4);o.start();o.stop(n+.4);}
    else{o.type='sine';o.frequency.setValueAtTime(t==='trail'?659:440,n);g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.01,n+.2);o.start();o.stop(n+.2);}
  }catch(e){}
}

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function fp(n){if(!n&&n!==0)return null;if(n>=100)return n.toFixed(2);if(n>=1)return n.toFixed(3);if(n>=0.1)return n.toFixed(4);return n.toFixed(6);}
function fU(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toFixed(0);}
function getStats(){let ob=0,os=0,conf=0,trail=0;Object.values(C.symbolData).forEach(d=>{if(d.error)return;if(d.zone==='ob')ob++;if(d.zone==='os')os++;if(d.conf)conf++;if(d.trailActive)trail++;});return{ob,os,conf,trail,total:C.symbols.length};}
function getList(){
  let L=Object.keys(C.symbolData);
  if(C.search.trim()){const q=C.search.toUpperCase().trim();L=L.filter(s=>s.includes(q));}
  if(C.filter==='ob')L=L.filter(s=>C.symbolData[s].zone==='ob');
  else if(C.filter==='os')L=L.filter(s=>C.symbolData[s].zone==='os');
  else if(C.filter==='conf')L=L.filter(s=>C.symbolData[s].conf);
  else if(C.filter==='signal')L=L.filter(s=>C.symbolData[s].signal||C.symbolData[s].conf);
  else if(C.filter==='trail')L=L.filter(s=>C.symbolData[s].trailActive);
  L.sort((a,b)=>C.sortBy==='symbol'?a.localeCompare(b):C.sortBy==='vol'?(C.symbolMeta[b]?.vol||0)-(C.symbolMeta[a]?.vol||0):(C.symbolData[b]?.rsi??-1)-(C.symbolData[a]?.rsi??-1));
  return L;
}
function getPStats(period){
  const now=Date.now();let cut=0;
  if(period==='today'){const d=new Date();d.setHours(0,0,0,0);cut=d.getTime();}
  else if(period==='week')cut=now-7*86400000;else if(period==='month')cut=now-30*86400000;
  const f=period==='all'?C.closedTrades:C.closedTrades.filter(t=>t.closeTs>=cut);
  const w=f.filter(t=>t.pct>=0),l=f.filter(t=>t.pct<0);
  return{total:f.length,wins:w.length,losses:l.length,wr:f.length?(w.length/f.length)*100:0,tot:f.reduce((a,t)=>a+t.pct,0),trades:f};
}

// ═══════════════════════════════════════════════
//  DOM HELPER
// ═══════════════════════════════════════════════
function el(tag,at={},...ch){
  const e=document.createElement(tag);
  Object.entries(at).forEach(([k,v])=>{
    if(k==='className')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='checked')e.checked=v;
    else e.setAttribute(k,v);
  });
  ch.forEach(c=>{if(c==null)return;e.appendChild(c instanceof Node?c:document.createTextNode(String(c)));});
  return e;
}

// ═══════════════════════════════════════════════
//  RENDER — SERVER SETUP (أول مرة على Vercel)
// ═══════════════════════════════════════════════
function rServerSetup() {
  let url = localStorage.getItem('rsi_server') || '';
  const box = el('div', {className:'login-box'}, 
    el('div',{style:{fontSize:'40px',marginBottom:'12px'}},'🔗'),
    el('div',{style:{fontSize:'20px',fontWeight:'800',color:'var(--accent)',marginBottom:'6px'}},'إعداد السيرفر'),
    el('div',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'20px',lineHeight:'1.6'}},
      'أدخل رابط سيرفر Railway الخاص بك'),
  );
  const inp = el('input',{
    type:'text',className:'login-inp',
    placeholder:'https://rsi-scanner.up.railway.app',
    value: url, style:{direction:'ltr',letterSpacing:'0'}
  });
  inp.oninput = () => url = inp.value.trim();
  const err = el('div',{className:'login-err'});
  const btn = el('button',{className:'login-btn',style:{marginTop:'8px'}});
  btn.textContent = '✅ حفظ والمتابعة';
  btn.onclick = async () => {
    if(!url){err.textContent='أدخل رابط السيرفر';return;}
    btn.textContent='⏳ يتحقق...';
    try {
      const res = await fetch(`${url.replace(/\/$/,'')}/api/ping`);
      const d = await res.json();
      if(d.ok){
        localStorage.setItem('rsi_server', url.replace(/\/$/,''));
        err.textContent='';
        render();
      } else throw new Error('فشل');
    } catch(e) {
      err.textContent='❌ تعذر الاتصال بالسيرفر — تحقق من الرابط';
      btn.textContent='✅ حفظ والمتابعة';
    }
  };
  const skipBtn = el('button',{
    className:'btn',
    style:{width:'100%',marginTop:'8px',textAlign:'center',justifyContent:'center'},
    onClick:()=>{localStorage.setItem('rsi_server','');render();}
  },'🏠 تشغيل محلي (بدون Railway)');
  box.appendChild(inp);box.appendChild(err);box.appendChild(btn);box.appendChild(skipBtn);
  return el('div',{className:'login-overlay'},box);
}

function needsSetup() {
  // على Vercel نطلب الإعداد إذا ما في سيرفر محفوظ
  // على السيرفر المحلي (نفس الـ host) لا نحتاج
  const isVercel = location.hostname.includes('vercel.app') || 
                   location.hostname.includes('vercel.sh') ||
                   location.search.includes('vercel=1');
  const hasSavedServer = localStorage.getItem('rsi_server') !== null;
  return isVercel && !hasSavedServer;
}
function rLogin(){
  let u='',p='';
  const ui=el('input',{type:'text',className:'login-inp',placeholder:'Username',autocomplete:'off'});ui.oninput=()=>u=ui.value;
  const pi=el('input',{type:'password',className:'login-inp pw',placeholder:'••••',autocomplete:'off'});pi.oninput=()=>p=pi.value;
  const err=el('div',{className:'login-err'});
  const form=el('form',{className:'login-form'},ui,pi,err,el('button',{type:'submit',className:'login-btn'},'دخول →'));
  form.onsubmit=async e=>{
    e.preventDefault();
    const ok=await doLogin(u,p);
    if(!ok){err.textContent='❌ بيانات الدخول خاطئة';ui.classList.add('err');pi.classList.add('err');const b=document.querySelector('.login-box');if(b){b.classList.add('shake');setTimeout(()=>b.classList.remove('shake'),400);}setTimeout(()=>{err.textContent='';ui.classList.remove('err');pi.classList.remove('err');},2500);}
  };
  return el('div',{className:'login-overlay'},el('div',{className:'login-box'},
    el('div',{style:{fontSize:'52px',marginBottom:'14px'}},'📊'),
    el('div',{style:{fontSize:'24px',fontWeight:'800',color:'var(--accent)',marginBottom:'4px'}},'RSI Scanner Pro'),
    el('div',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'24px'}},'Server Edition v3'),
    form));
}

// ═══════════════════════════════════════════════
//  RENDER — NAVBAR
// ═══════════════════════════════════════════════
function rNav(){
  const nav=el('div',{className:'navbar'});
  nav.appendChild(el('button',{className:`ntab ${C.page==='dashboard'?'dash':''}`,onClick:()=>{C.page='dashboard';render();}},'📊 الداشبورد'));
  const sb=el('button',{className:`ntab ${C.page==='subscribers'?'sub':''}`,onClick:()=>{C.page='subscribers';render();}});
  sb.appendChild(document.createTextNode('🪞 المشتركون'));
  if(C.accounts.length)sb.appendChild(el('span',{className:'nbadge'},String(C.accounts.length)));
  nav.appendChild(sb);
  const nr=el('div',{className:'nav-right'});
  const pill=el('div',{className:`copy-pill ${C.copyOn?'on':'off'}`,onClick:()=>send('toggleCopy')});
  pill.appendChild(el('span',{className:`cpd ${C.copyOn?'on':'off'}`}));
  pill.appendChild(document.createTextNode(C.copyOn?`نشط ${C.accounts.length}`:' Copy: متوقف'));
  nr.appendChild(pill);
  nr.appendChild(el('span',{className:`ws-conn ${C.wsConn?'on':'off'}`},C.wsConn?'🟢 متصل':'🔴 منقطع'));
  // زر تغيير السيرفر
  const serverUrl = getServerUrl();
  if(serverUrl) {
    const srv = el('span',{
      style:{fontSize:'10px',color:'var(--text2)',cursor:'pointer',padding:'3px 8px',background:'var(--bg3)',borderRadius:'6px',border:'1px solid var(--border)'},
      onClick:()=>{if(confirm('تغيير رابط السيرفر؟')){localStorage.removeItem('rsi_server');localStorage.removeItem('rsi_token');location.reload();}}
    },`🔗 ${serverUrl.replace('https://','').slice(0,20)}...`);
    nr.appendChild(srv);
  }
  nav.appendChild(nr);
  return nav;
}

// ═══════════════════════════════════════════════
//  RENDER — DASH HEADER
// ═══════════════════════════════════════════════
function rDashHdr(st){
  const hdr=el('div',{className:'dash-hdr'});
  const r1=el('div',{className:'dr'});
  const ls=el('div',{});
  ls.appendChild(el('div',{className:'logo-t'},'RSI Scanner Pro'));
  const lsub=el('div',{className:'logo-s'});
  lsub.innerHTML=`Binance Futures • <span style="color:var(--accent)">${C.settings.mode==='RSI'?'RSI(14)':`${C.settings.mode}(${C.settings.maPeriod})`}</span>`;
  ls.appendChild(lsub);r1.appendChild(ls);
  const sr=el('div',{style:{display:'flex',gap:'6px',flex:'1',justifyContent:'center',flexWrap:'wrap'}});
  const mkS=(l,v,c,bc)=>{const b=el('div',{className:'sbox',style:bc?{borderColor:bc}:{}});b.appendChild(el('div',{className:'slbl',style:bc?{color:bc}:{}},l));b.appendChild(el('div',{className:`sval ${c}`},String(v)));return b;};
  sr.appendChild(mkS('OB ≥70',st.ob,'c-red'));sr.appendChild(mkS('OS ≤30',st.os,'c-blue'));
  sr.appendChild(mkS('أكيدة',st.conf,'c-confirmed','var(--confirmed)'));sr.appendChild(mkS('Trail',st.trail,'c-purple','var(--purple)'));
  sr.appendChild(mkS('الكل',st.total,''));r1.appendChild(sr);
  const ctrl=el('div',{className:'dr'});
  const si=el('select',{className:'sel',onChange:e=>sendSettings({interval:e.target.value})});
  ['1m','3m','5m','15m','30m','1h','2h','4h','1d'].forEach(v=>{const o=el('option',{value:v},v);if(v===C.settings.interval)o.setAttribute('selected','');si.appendChild(o);});
  ctrl.appendChild(si);
  ctrl.appendChild(el('button',{className:'btn',onClick:()=>sendSettings({soundEnabled:!C.settings.soundEnabled})},C.settings.soundEnabled?'🔔':'🔕'));
  ctrl.appendChild(el('button',{className:'btn',style:{background:C.settings.autoSend?'rgba(46,213,115,.12)':'rgba(255,71,87,.12)',borderColor:C.settings.autoSend?'var(--green)':'var(--red)',color:C.settings.autoSend?'var(--green)':'var(--red)',fontWeight:'700'},onClick:()=>sendSettings({autoSend:!C.settings.autoSend})},C.settings.autoSend?'📤 ON':'📤 OFF'));

function rCard(sym){

  const delta=d.prevRsi?d.rsi-d.prevRsi:0;
  let cc='card';
  if(d.trailActive)cc+=' trail';

  if(C.openTrades.some(t=>t.symbol===sym))bdg.appendChild(el('span',{className:'bdg b-op'},'📂'));
  hdr.appendChild(bdg);card.appendChild(hdr);
  const vr=el('div',{className:'cvr'});
  const ld=el('div',{});ld.appendChild(el('div',{style:{fontSize:'8px',color:'var(--text2)',marginBottom:'2px'}},'المؤشر'));

  const rd=el('div',{style:{textAlign:'left'}});rd.appendChild(el('div',{style:{fontSize:'8px',color:'var(--text2)',marginBottom:'2px'}},`السابق: ${d.prevRsi?d.prevRsi.toFixed(1):'--'}`));

  const bar=el('div',{className:'rbar'});const fill=el('div',{className:'rfill'});

  const btns=el('div',{className:'acc-btns'});
  if(!isMaster)btns.appendChild(el('button',{className:`abtn ${acc.isEnabled!==false?'toff':'ton'}`,onClick:()=>send('toggleAccount',{id:acc.id})},acc.isEnabled!==false?'⏸ إيقاف':'▶️ تشغيل'));
  btns.appendChild(el('button',{className:'abtn ref',onClick:()=>send('refreshAccount',{id:acc.id})},'🔄'));
  btns.appendChild(el('button',{className:'abtn edit',onClick:()=>{showForm=true;formAccId=acc.id;fd={...acc,apiKey:'',apiSecret:''};render();}},'✏️'));
  btns.appendChild(el('button',{className:'abtn del',onClick:()=>{if(confirm(`حذف ${acc.name}؟`))send('deleteAccount',{id:acc.id});}},'🗑'));
  head.appendChild(btns);card.appendChild(head);
  const body=el('div',{style:{padding:'16px 18px'}});
  const qg=el('div',{className:'qs-grid'});
  const mkQ=(icon,lb,v,vc='var(--text)')=>{const q=el('div',{className:'qs'});q.appendChild(el('div',{className:'qs-icon'},icon));q.appendChild(el('div',{className:'qs-lbl'},lb));q.appendChild(el('div',{className:'qs-val',style:{color:vc}},v));return q;};
  qg.appendChild(mkQ('💵','الرصيد المتاح',bal!=null?`$${parseFloat(bal).toFixed(2)}`:'—','var(--accent)'));
  qg.appendChild(mkQ('📊','صفقات مفتوحة',String(pos.length),pos.length?'var(--yellow)':'var(--text2)'));
  qg.appendChild(mkQ('💹','PnL غير محقق',pos.length?`${totPnl>=0?'+':''}$${totPnl.toFixed(2)}`:'—',totPnl>0?'var(--green)':totPnl<0?'var(--red)':'var(--text2)'));
  qg.appendChild(mkQ('🏆','نسبة النجاح',stats.closes?`${(stats.wins/stats.closes*100).toFixed(0)}%`:'—'));
  qg.appendChild(mkQ('📈','الأداء الكلي',stats.closes?`${stats.tot>=0?'+':''}${stats.tot.toFixed(2)}%`:'—',stats.tot>=0?'var(--green)':'var(--red)'));
  if(!isMaster)qg.appendChild(mkQ('💰','حجم الصفقة',`${acc.sizeRatio||5}% رصيد`,'var(--orange)'));
  body.appendChild(qg);
  // جدول الصفقات
  const pt=el('div',{className:'ptable'});
  const ptt=el('div',{className:'pt-title'});
  ptt.appendChild(el('span',{},`📊 الصفقات المفتوحة (${pos.length})`));
  if(pos.length)ptt.appendChild(el('span',{style:{fontWeight:'800',fontSize:'13px',color:totPnl>=0?'var(--green)':'var(--red)'}},`مجموع: ${totPnl>=0?'+':''}$${totPnl.toFixed(2)}`));
  pt.appendChild(ptt);
  if(!pos.length){pt.appendChild(el('div',{className:'no-pos'},'📭 لا توجد صفقات مفتوحة حالياً'));}
  else{
    const ph=el('div',{className:'pt-head'});
    ['العملة','الاتجاه','الكمية','رافعة','دخول','حالي','PnL $','PnL%'].forEach(h=>ph.appendChild(el('div',{},h)));
    pt.appendChild(ph);
    pos.forEach((p,i)=>{
      const amt=parseFloat(p.positionAmt),pnl=parseFloat(p.unRealizedProfit)||0;
      const entry=parseFloat(p.entryPrice)||0,mark=parseFloat(p.markPrice)||0;
      const pct=entry?(((mark-entry)/entry)*100*(amt>0?1:-1)):0;
      const isL=amt>0;
      const row=el('div',{className:'pt-row',style:{background:i%2===0?'transparent':'rgba(255,255,255,.012)'}});
      const sym=el('div',{className:'pt-sym'});sym.appendChild(document.createTextNode(p.symbol.replace('USDT','')));sym.appendChild(el('span',{},'/U'));row.appendChild(sym);
      row.appendChild(el('div',{className:isL?'pt-long':'pt-short'},isL?'🟢 LONG':'🔴 SHORT'));
      row.appendChild(el('div',{className:'pt-num'},Math.abs(amt).toFixed(3)));
      row.appendChild(el('div',{className:'pt-lev'},`${p.leverage||'—'}x`));
      row.appendChild(el('div',{className:'pt-num'},entry?fp(entry):'—'));
      row.appendChild(el('div',{className:'pt-num',style:{color:mark>entry?'var(--green)':'var(--red)'}},mark?fp(mark):'—'));
      const pnlC=el('div',{className:'pt-pnl'});pnlC.appendChild(el('div',{className:pnl>=0?'pt-pos':'pt-neg'},`${pnl>=0?'+':''}$${pnl.toFixed(2)}`));row.appendChild(pnlC);
      row.appendChild(el('div',{className:pct>=0?'pt-pos':'pt-neg',style:{fontSize:'11px'}},`${pct>=0?'+':''}${pct.toFixed(2)}%`));
      pt.appendChild(row);
    });
  }
  body.appendChild(pt);
  // شريط API
  const ab=el('div',{className:'api-bar'});
  ab.appendChild(el('span',{style:{fontFamily:'monospace',fontSize:'10px',color:'var(--text2)',letterSpacing:'.5px'}},`🔑 ${acc.apiKeyPreview||'غير مضاف'}`));
  if(acc.balanceAt){const ago=Math.round((Date.now()-acc.balanceAt)/1000);ab.appendChild(el('span',{},`⏱ ${ago<60?ago+'s':Math.round(ago/60)+'m'} مضت`));}
  const abA=el('div',{className:'api-bar-acts'});
  abA.appendChild(el('button',{className:'abtn test',style:{padding:'4px 10px'},onClick:()=>send('refreshAccount',{id:acc.id})},'🔌 فحص API + رصيد'));
  if(!isMaster)abA.appendChild(el('button',{className:'abtn',style:{background:'rgba(255,71,87,.07)',borderColor:'var(--red)',color:'var(--red)',padding:'4px 10px'},onClick:()=>{if(confirm(`إغلاق كل صفقات ${acc.name}؟`))send('closeAllAccount',{id:acc.id});}},'🔒 أغلق الكل'));
  ab.appendChild(abA);body.appendChild(ab);
  card.appendChild(body);return card;
}

function rAddForm(){
  const editing=formAccId!=null?C.accounts.find(a=>a.id===formAccId):null;
  const form=el('div',{className:'add-form'});
  form.appendChild(el('div',{className:'af-title'},editing?`✏️ تعديل: ${editing.name}`:'➕ إضافة حساب'));
  const isFirst=C.accounts.length===0&&!editing;
  if(isFirst){const n=el('div',{className:'af-notice m'});n.innerHTML='⭐ <b>أول حساب = Master تلقائياً</b>';form.appendChild(n);}
  const warn=el('div',{className:'af-notice w'});warn.innerHTML='⚠️ API Key بصلاحية <b>Trading فقط</b> — بدون Withdrawal';form.appendChild(warn);
  const grid=el('div',{className:'af-grid'});
  function af(lb,field,type='text',ex={}){const w=el('div',{className:'aff'});w.appendChild(el('label',{},lb));const i=el('input',{type,value:fd[field]||'',...ex});i.oninput=()=>fd[field]=i.value;w.appendChild(i);return w;}
  function afs(lb,field,opts){const w=el('div',{className:'aff'});w.appendChild(el('label',{},lb));const s=el('select',{});opts.forEach(([v,t])=>{const o=el('option',{value:v},t);if(v==(fd[field]||opts[0][0]))o.setAttribute('selected','');s.appendChild(o);});s.onchange=()=>fd[field]=s.value;w.appendChild(s);return w;}
  grid.appendChild(af('اسم الحساب','name'));
  grid.appendChild(afs('التصنيف','tag',[['personal','👤 شخصي'],['family','👨‍👩‍👧 عائلة'],['other','👥 آخر']]));
  const kw=el('div',{className:'aff full'});kw.appendChild(el('label',{},'🔑 API Key (Trading Only)'));const ki=el('input',{type:'text',className:'mono',value:fd.apiKey||'',placeholder:'أدخل API Key'});ki.oninput=()=>fd.apiKey=ki.value.trim();kw.appendChild(ki);grid.appendChild(kw);
  const sw=el('div',{className:'aff full'});sw.appendChild(el('label',{},'🔒 API Secret'));const si=el('input',{type:'password',className:'secret',value:fd.apiSecret||'',placeholder:'أدخل API Secret'});si.oninput=()=>fd.apiSecret=si.value.trim();sw.appendChild(si);grid.appendChild(sw);
  if(!isFirst){grid.appendChild(af('💰 حجم الصفقة (% رصيد)','sizeRatio','number',{min:'0.1',max:'100',step:'0.1'}));}
  if(!isFirst){const mr=el('div',{className:'aff'});mr.appendChild(el('label',{},'Master'));const ml=el('label',{style:{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',fontSize:'12px'}});const mc=el('input',{type:'checkbox',checked:fd.isMaster||false});mc.onchange=()=>fd.isMaster=mc.checked;ml.appendChild(mc);ml.appendChild(document.createTextNode('⭐ هذا الحساب الرئيسي'));mr.appendChild(ml);grid.appendChild(mr);}
  form.appendChild(grid);
  const btns=el('div',{className:'af-btns'});
  const testBtn=el('button',{className:'af-btn test',onClick:()=>{
    if(!fd.apiKey||!fd.apiSecret){alert('أدخل API Key و Secret');return;}
    testBtn.textContent='⏳ يتحقق...';
    send('testAccount',{apiKey:fd.apiKey,apiSecret:fd.apiSecret});
    setTimeout(()=>testBtn.textContent='🔌 اختبار',3000);
  }},'🔌 اختبار الاتصال');
  const saveBtn=el('button',{className:'af-btn save',onClick:()=>{
    if(!fd.name){alert('أدخل الاسم');return;}
    if(!fd.apiKey){alert('أدخل API Key');return;}
    if(!fd.apiSecret){alert('أدخل API Secret');return;}
    saveBtn.textContent='⏳ يتحقق...';
    if(editing){send('updateAccount',{...editing,...fd,apiKey:fd.apiKey||undefined,apiSecret:fd.apiSecret||undefined});showForm=false;render();}
    else send('addAccount',{...fd,isMaster:isFirst||fd.isMaster});
  }},'💾 حفظ');
  btns.appendChild(saveBtn);btns.appendChild(testBtn);
  if(editing)btns.appendChild(el('button',{className:'af-btn cancel',onClick:()=>{showForm=false;formAccId=null;render();}},'✕ إلغاء'));
  form.appendChild(btns);return form;
}

// ═══════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  if(needsSetup()){root.innerHTML='';root.appendChild(rServerSetup());return;}
  if(!C.loggedIn){root.innerHTML='';root.appendChild(rLogin());return;}
  const ae=document.activeElement;
  const typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='SELECT'||ae.tagName==='TEXTAREA');
  if(typing&&C.page==='dashboard'&&root.querySelector('.dash-hdr')){
    const st=getStats();
    const sv=root.querySelectorAll('.sval');
    if(sv.length>=5){sv[0].textContent=st.ob;sv[1].textContent=st.os;sv[2].textContent=st.conf;sv[3].textContent=st.trail;sv[4].textContent=st.total;}
    if(C.progress>0){const pb=root.querySelector('.prog-bar');if(pb){const pf=pb.querySelector('.prog-fill');if(pf)pf.style.width=`${C.progress}%`;}}
    const grid=root.querySelector('.grid');
    if(grid){const list=getList();const ng=el('div',{className:'grid'});list.forEach(sym=>{const c=rCard(sym);if(c)ng.appendChild(c);});grid.parentNode.replaceChild(ng,grid);}
    const ot=root.querySelector('.toast');const nt=rToast();
    if(ot&&nt)ot.parentNode.replaceChild(nt,ot);else if(ot&&!nt)ot.remove();else if(!ot&&nt)root.appendChild(nt);
    return;
  }
  root.innerHTML='';
  root.appendChild(rNav());
  if(C.page==='subscribers'){root.appendChild(rSubPage());const t=rToast();if(t)root.appendChild(t);return;}
  const st=getStats();
  root.appendChild(rDashHdr(st));
  // AutoSend bar
  const asb=el('div',{className:`as-bar ${C.settings.autoSend?'on':'off'}`,onClick:()=>sendSettings({autoSend:!C.settings.autoSend})});
  asb.appendChild(el('span',{className:`asdot ${C.settings.autoSend?'on':'off'}`}));
  asb.appendChild(document.createTextNode(C.settings.autoSend?'🟢 الإرسال التلقائي: تشغيل':'🔴 الإرسال متوقف'));
  root.appendChild(asb);
  if(C.progress>0){const pb=el('div',{className:'prog-bar'});const pf=el('div',{className:'prog-fill'});pf.style.width=`${C.progress}%`;pb.appendChild(pf);root.appendChild(pb);}
  const leg=el('div',{className:'legend'});
  leg.appendChild(el('span',{style:{fontWeight:'700'}},'الإشارات:'));
  [['c-red','🔴 تجاوز 70'],['c-orange','🟠 نزل من 70'],['c-blue','🔵 نزل من 30'],['c-green','🟢 صعد من 30'],['c-confirmed','⚡ أكيدة'],['c-purple','🟣 Trailing']].forEach(([c,lb])=>leg.appendChild(el('span',{className:c},lb)));
  root.appendChild(leg);
  const gi=el('div',{className:'ginfo'});
  gi.appendChild(el('span',{},`عرض ${getList().length} من ${C.symbols.length} عملة`));
  gi.appendChild(el('span',{className:'c-purple'},C.wsConn?`⚡ Live`:'📡 REST'));
  root.appendChild(gi);
  const grid=el('div',{className:'grid'});
  const list=getList();
  if(!C.symbols.length){const ls=el('div',{style:{gridColumn:'1/-1',display:'flex',flexDirection:'column',alignItems:'center',padding:'60px',gap:'14px'}});ls.appendChild(el('div',{style:{width:'48px',height:'48px',border:'3px solid var(--bg3)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite'}}));ls.appendChild(el('div',{style:{color:'var(--text2)',fontSize:'14px'}},'جاري الاتصال بالسيرفر...'));grid.appendChild(ls);}
  else if(!list.length){const em=el('div',{style:{gridColumn:'1/-1',textAlign:'center',padding:'60px',color:'var(--text2)'}});em.innerHTML='🔍<br>لا توجد نتائج';grid.appendChild(em);}
  else list.forEach(sym=>{const c=rCard(sym);if(c)grid.appendChild(c);});
  root.appendChild(grid);
  root.appendChild(rDrawer());
  const t=rToast();if(t)root.appendChild(t);
}

// ═══════════════════════════════════════════════
//  BOOTSTRAP
// ═══════════════════════════════════════════════
const savedToken = localStorage.getItem('rsi_token');
if(savedToken) {
  C.token = savedToken;
  C.loggedIn = true;
  render();
  connectWS();
} else {
  render();
}
</script>
